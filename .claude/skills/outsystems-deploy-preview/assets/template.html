<!DOCTYPE html>
<!--
  template-version: 1.0.0
  Generated by the `outsystems-deploy-preview` skill.
  Populate via `scripts/build.py <cache-dir> <output-path> --app-info ... etc.`.
  Placeholder: /*__PREVIEW_DATA__*/
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OutSystems Deploy Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --os-bg: #0A0A0F;
      --os-bg-2: #11111A;
      --os-card: #161620;
      --os-card-2: #1C1C28;
      --os-border: #262633;
      --os-border-strong: #353548;
      --os-text: #F5F5F7;
      --os-text-muted: #9B9BA8;
      --os-text-dim: #6B6B7A;
      --os-red: #FF3D52;
      --os-red-dark: #C42030;
      --os-red-glow: rgba(255, 61, 82, 0.18);

      --c-source: #60A5FA;
      --c-target: #FBBF24;
      --c-none: #34D399;
      --c-low: #60A5FA;
      --c-medium: #FBBF24;
      --c-high: #FB923C;
      --c-concerning: #FF3D52;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--os-bg);
      color: var(--os-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      letter-spacing: -0.01em;
      min-height: 100vh;
    }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px; padding: 40px; text-align: center;
    }
    .empty-state .mark {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: white; font-size: 28px;
      box-shadow: 0 10px 40px var(--os-red-glow);
    }
    .empty-state h1 { font-size: 20px; font-weight: 700; margin: 0; }
    .empty-state p { color: var(--os-text-muted); max-width: 500px; line-height: 1.55; font-size: 14px; }
    .empty-state code {
      background: var(--os-card); padding: 2px 8px; border-radius: 5px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      border: 1px solid var(--os-border); color: var(--os-text);
    }

    /* App layout */
    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    /* Brand header */
    header.brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 32px;
    }
    .brand-mark {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px var(--os-red-glow);
      font-weight: 800; color: white; font-size: 18px;
    }
    .brand-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
    .brand-sub { font-size: 12px; color: var(--os-text-muted); margin-top: 2px; }

    /* Title */
    .title-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }
    h1.title {
      font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
      margin: 0; line-height: 1.2;
    }
    .title-sub {
      font-size: 14px; color: var(--os-text-muted); margin-top: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .title-sub .arrow { color: var(--os-text-dim); font-family: 'JetBrains Mono', monospace; }
    .title-sub .env-source { color: var(--c-source); font-weight: 500; }
    .title-sub .env-target { color: var(--c-target); font-weight: 500; }

    /* Classification badge */
    .classification {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      border: 1px solid;
    }
    .classification.fresh       { background: rgba(251,191,36,0.08);  color: var(--c-medium); border-color: rgba(251,191,36,0.32); }
    .classification.update      { background: rgba(96,165,250,0.08);  color: var(--c-low);    border-color: rgba(96,165,250,0.32); }
    .classification.noop        { background: rgba(52,211,153,0.08);  color: var(--c-none);   border-color: rgba(52,211,153,0.32); }
    .classification.concerning  { background: rgba(255,61,82,0.10);   color: var(--c-concerning); border-color: rgba(255,61,82,0.36); }

    /* Side-by-side comparison */
    .compare {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 16px; align-items: stretch;
      margin-bottom: 28px;
    }
    .env-card {
      background: linear-gradient(180deg, var(--os-card) 0%, var(--os-card-2) 100%);
      border: 1px solid var(--os-border);
      border-radius: 14px;
      padding: 22px 24px;
      position: relative;
    }
    .env-card.source { border-left: 3px solid var(--c-source); }
    .env-card.target { border-left: 3px solid var(--c-target); }
    .env-card-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .env-card.source .env-card-label { color: var(--c-source); }
    .env-card.target .env-card-label { color: var(--c-target); }
    .env-card-env-name {
      font-size: 20px; font-weight: 700;
      letter-spacing: -0.01em; margin-bottom: 16px;
    }
    .env-card-row {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 7px 0;
      font-size: 13px;
    }
    .env-card-row + .env-card-row { border-top: 1px solid var(--os-border); }
    .env-card-key { color: var(--os-text-muted); }
    .env-card-val { color: var(--os-text); font-weight: 500; font-variant-numeric: tabular-nums; }
    .env-card-val.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .env-card-val.dim { color: var(--os-text-dim); font-style: italic; font-weight: 400; }
    .env-card-val.pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 10px;
      background: var(--os-card-2);
      border: 1px solid var(--os-border);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    .gap-indicator {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 0 8px;
      min-width: 90px;
      gap: 8px;
    }
    .gap-arrow {
      font-size: 28px; color: var(--os-text-muted); font-family: 'JetBrains Mono', monospace;
      line-height: 1;
    }
    .gap-num {
      font-size: 24px; font-weight: 700; color: var(--os-text);
      font-variant-numeric: tabular-nums;
    }
    .gap-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--os-text-muted); font-weight: 600;
    }

    /* Risk panel */
    .risk-panel {
      background: var(--os-card);
      border: 1px solid var(--os-border);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 22px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 18px;
      align-items: center;
    }
    .risk-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      border: 1px solid;
      white-space: nowrap;
    }
    .risk-badge.none       { background: rgba(52,211,153,0.10);  color: var(--c-none);       border-color: rgba(52,211,153,0.36); }
    .risk-badge.low        { background: rgba(96,165,250,0.10);  color: var(--c-low);        border-color: rgba(96,165,250,0.36); }
    .risk-badge.medium     { background: rgba(251,191,36,0.10);  color: var(--c-medium);     border-color: rgba(251,191,36,0.36); }
    .risk-badge.high       { background: rgba(251,146,60,0.12);  color: var(--c-high);       border-color: rgba(251,146,60,0.38); }
    .risk-badge.concerning { background: rgba(255,61,82,0.12);   color: var(--c-concerning); border-color: rgba(255,61,82,0.40); }

    .risk-text { display: flex; flex-direction: column; gap: 4px; }
    .risk-label { font-size: 16px; font-weight: 600; color: var(--os-text); }
    .risk-note { font-size: 13px; color: var(--os-text-muted); line-height: 1.5; }

    /* Recommendations */
    .recs {
      background: var(--os-bg-2);
      border: 1px solid var(--os-border);
      border-radius: 14px;
      padding: 22px 24px;
    }
    .recs-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--os-text-muted); font-weight: 600;
      margin-bottom: 12px;
    }
    .recs ul { margin: 0; padding: 0; list-style: none; }
    .recs li {
      padding: 8px 0;
      font-size: 13px;
      color: var(--os-text);
      display: flex; gap: 10px;
      line-height: 1.5;
    }
    .recs li + li { border-top: 1px solid var(--os-border); }
    .recs li::before {
      content: "→";
      color: var(--os-red);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .recs code {
      background: var(--os-card); padding: 1px 6px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      border: 1px solid var(--os-border);
    }

    /* Footer */
    .foot {
      margin-top: 32px;
      padding-top: 18px;
      border-top: 1px solid var(--os-border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--os-text-dim);
    }
    .foot a { color: var(--os-text-muted); text-decoration: none; }
    .foot a:hover { color: var(--os-text); }

    @media (max-width: 720px) {
      .compare { grid-template-columns: 1fr; }
      .gap-indicator { padding: 8px 0; min-width: auto; }
      .risk-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <template id="tpl-app">
    <div class="page">
      <header class="brand">
        <div class="brand-mark">D</div>
        <div>
          <div class="brand-name">Deploy Preview</div>
          <div class="brand-sub">OutSystems · synchronous environment comparison</div>
        </div>
      </header>

      <div class="title-row">
        <div>
          <h1 class="title" id="t-title">Promote app</h1>
          <div class="title-sub">
            <span class="env-source" id="t-source-env">—</span>
            <span class="arrow">→</span>
            <span class="env-target" id="t-target-env">—</span>
            <span style="margin-left:12px;color:var(--os-text-dim);">·</span>
            <span id="t-app-desc" style="color:var(--os-text-muted);"></span>
          </div>
        </div>
        <div class="classification" id="t-classification">—</div>
      </div>

      <section class="compare">
        <div class="env-card source">
          <div class="env-card-label">Source</div>
          <div class="env-card-env-name" id="s-env">—</div>
          <div class="env-card-row"><span class="env-card-key">Revision</span><span class="env-card-val pill" id="s-rev">—</span></div>
          <div class="env-card-row"><span class="env-card-key">Updated</span><span class="env-card-val" id="s-date">—</span></div>
          <div class="env-card-row"><span class="env-card-key">Type</span><span class="env-card-val" id="s-type">—</span></div>
        </div>

        <div class="gap-indicator">
          <div class="gap-arrow">→</div>
          <div class="gap-num" id="g-num">—</div>
          <div class="gap-label" id="g-label">gap</div>
        </div>

        <div class="env-card target">
          <div class="env-card-label">Target</div>
          <div class="env-card-env-name" id="t-env">—</div>
          <div class="env-card-row"><span class="env-card-key">Revision</span><span class="env-card-val pill" id="t-rev">—</span></div>
          <div class="env-card-row"><span class="env-card-key">Deployed</span><span class="env-card-val" id="t-date">—</span></div>
          <div class="env-card-row"><span class="env-card-key">Purpose</span><span class="env-card-val" id="t-purpose">—</span></div>
        </div>
      </section>

      <section class="risk-panel">
        <div class="risk-badge" id="r-badge">—</div>
        <div class="risk-text">
          <div class="risk-label" id="r-label">—</div>
          <div class="risk-note" id="r-note">—</div>
        </div>
      </section>

      <section class="recs">
        <div class="recs-title">Recommendations</div>
        <ul id="recs-list"></ul>
      </section>

      <div class="foot">
        <span id="foot-app-key">—</span>
        <span><a id="foot-url" target="_blank" rel="noopener">—</a></span>
      </div>
    </div>
  </template>

  <template id="tpl-empty">
    <div class="empty-state">
      <div class="mark">D</div>
      <h1>Template not yet populated</h1>
      <p>
        This is the bare <code>template.html</code> shipped with the
        <code>outsystems-deploy-preview</code> skill. Run the skill
        through Claude Code (or invoke <code>scripts/build.py</code> directly)
        to populate it with your preview data.
      </p>
      <p style="font-size: 12px;">Expected placeholder: <code>/*__PREVIEW_DATA__*/</code>.</p>
    </div>
  </template>

  <script>
    // ============================================================
    // Data — populated by build.py. Do not edit by hand.
    // ============================================================
    const PREVIEW_DATA = /*__PREVIEW_DATA__*/null;

    // ============================================================
    // Boot
    // ============================================================
    const root = document.getElementById('app-root');
    if (!PREVIEW_DATA || !PREVIEW_DATA.app) {
      root.appendChild(document.getElementById('tpl-empty').content.cloneNode(true));
    } else {
      root.appendChild(document.getElementById('tpl-app').content.cloneNode(true));
      boot();
    }

    function boot() {
      const D = PREVIEW_DATA;

      document.title = `Deploy Preview · ${D.app.name} → ${D.targetEnv.name}`;

      // Title
      document.getElementById('t-title').textContent = `Promote ${D.app.name}`;
      document.getElementById('t-source-env').textContent = D.sourceEnv.name;
      document.getElementById('t-target-env').textContent = D.targetEnv.name;
      document.getElementById('t-app-desc').textContent = D.app.description || D.app.type;

      // Classification chip
      const cls = document.getElementById('t-classification');
      cls.className = `classification ${D.classification}`;
      const classifLabels = {
        fresh:      '⚡ Fresh deploy',
        update:     '↗ Update',
        noop:       '✓ No change',
        concerning: '⚠ Concerning',
      };
      cls.textContent = classifLabels[D.classification] || D.classification;

      // Source card
      document.getElementById('s-env').textContent = D.sourceEnv.name;
      document.getElementById('s-rev').textContent = `r${D.app.sourceRev}`;
      document.getElementById('s-date').textContent = D.app.sourceDate || '—';
      document.getElementById('s-type').textContent = D.app.type || '—';

      // Target card
      document.getElementById('t-env').textContent = D.targetEnv.name;
      document.getElementById('t-purpose').textContent = D.targetEnv.purpose || '—';
      const tRev = document.getElementById('t-rev');
      const tDate = document.getElementById('t-date');
      if (D.target.deployed) {
        tRev.textContent = `r${D.target.rev}`;
        tRev.classList.remove('dim');
        tDate.textContent = D.target.date || '—';
        tDate.classList.remove('dim');
      } else {
        tRev.textContent = 'not deployed';
        tRev.classList.add('dim');
        tDate.textContent = 'never';
        tDate.classList.add('dim');
      }

      // Gap indicator
      const gNum = document.getElementById('g-num');
      const gLabel = document.getElementById('g-label');
      if (!D.target.deployed) {
        gNum.textContent = '∞';
        gLabel.textContent = 'fresh';
      } else if (D.revGap === 0) {
        gNum.textContent = '0';
        gLabel.textContent = 'in sync';
      } else if (D.revGap > 0) {
        gNum.textContent = `+${D.revGap}`;
        gLabel.textContent = 'ahead';
      } else {
        gNum.textContent = D.revGap.toString();
        gLabel.textContent = 'behind';
      }

      // Risk panel
      const rBadge = document.getElementById('r-badge');
      rBadge.className = `risk-badge ${D.risk.level}`;
      rBadge.textContent = D.risk.level;
      document.getElementById('r-label').textContent = D.risk.label;
      document.getElementById('r-note').textContent = D.risk.note;

      // Recommendations
      const ul = document.getElementById('recs-list');
      if (D.recommendations && D.recommendations.length) {
        D.recommendations.forEach(r => {
          const li = document.createElement('li');
          // Render simple inline code fences for `code`
          li.innerHTML = r.replace(/`([^`]+)`/g, '<code>$1</code>');
          ul.appendChild(li);
        });
      } else {
        const li = document.createElement('li');
        li.textContent = 'No specific actions needed for this promotion.';
        ul.appendChild(li);
      }

      // Footer
      document.getElementById('foot-app-key').textContent = `${D.app.key.slice(0,8)} · ${D.app.name}`;
      const a = document.getElementById('foot-url');
      if (D.target.deployed && D.target.url) {
        a.href = D.target.url;
        a.textContent = D.target.url;
      } else if (D.targetEnv.host) {
        a.href = `https://${D.targetEnv.host}`;
        a.textContent = D.targetEnv.host;
      } else {
        a.removeAttribute('href');
        a.textContent = '—';
      }
    }
  </script>
</body>
</html>
