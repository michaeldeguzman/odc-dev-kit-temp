<!DOCTYPE html>
<!--
  template-version: 1.0.0
  Generated by the `outsystems-ai-agent-landscape` skill.
  Populate via `scripts/build.py <cache-dir> <output-path> --agents ... --connections ... --tenant-id ...`.
  Placeholder: /*__LANDSCAPE_DATA__*/
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OutSystems AI Agent Landscape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --os-bg: #0A0A0F;
      --os-bg-2: #11111A;
      --os-card: #161620;
      --os-card-2: #1C1C28;
      --os-border: #262633;
      --os-border-strong: #353548;
      --os-text: #F5F5F7;
      --os-text-muted: #9B9BA8;
      --os-text-dim: #6B6B7A;
      --os-red: #FF3D52;
      --os-red-dark: #C42030;
      --os-red-glow: rgba(255, 61, 82, 0.18);

      --c-agents:      #B57BFF;
      --c-conns:       #E94EAB;
      --c-trial:       #FBBF24;
      --c-customer:    #34D399;
      --c-public:      #60A5FA;
      --c-test:        #FB923C;
      --c-stale:       #6B6B7A;

      --c-amazonbedrock: #FF9900;
      --c-azureopenai:   #00A4EF;
      --c-anthropic:     #E94EAB;
      --c-customconnection: #9B9BA8;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--os-bg);
      color: var(--os-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; letter-spacing: -0.01em;
      min-height: 100vh;
    }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px; padding: 40px; text-align: center;
    }
    .empty-state .mark {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: white; font-size: 28px;
      box-shadow: 0 10px 40px var(--os-red-glow);
    }
    .empty-state h1 { font-size: 20px; font-weight: 700; margin: 0; }
    .empty-state p { color: var(--os-text-muted); max-width: 500px; line-height: 1.55; }
    .empty-state code {
      background: var(--os-card); padding: 2px 8px; border-radius: 5px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      border: 1px solid var(--os-border); color: var(--os-text);
    }

    .page { max-width: 1280px; margin: 0 auto; padding: 32px 32px 64px; }

    /* Brand header */
    header.brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px;
    }
    .brand-mark {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px var(--os-red-glow);
      font-weight: 800; color: white; font-size: 18px;
    }
    .brand-name { font-size: 16px; font-weight: 700; }
    .brand-sub { font-size: 12px; color: var(--os-text-muted); margin-top: 2px; }

    h1.title {
      font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
      margin: 0 0 6px 0; line-height: 1.2;
    }
    .title-sub {
      font-size: 13px; color: var(--os-text-muted); margin-bottom: 28px;
    }

    /* Stats */
    .stats {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 10px; margin-bottom: 32px;
    }
    .stat {
      background: linear-gradient(180deg, var(--os-card) 0%, var(--os-card-2) 100%);
      border: 1px solid var(--os-border);
      border-radius: 10px;
      padding: 12px 14px;
      position: relative; overflow: hidden;
    }
    .stat::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent, var(--os-red));
    }
    .stat-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--os-text-muted); font-weight: 600;
    }
    .stat-value {
      font-size: 22px; font-weight: 700; color: var(--os-text);
      margin-top: 4px; font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
    }
    .stat-detail { font-size: 10px; color: var(--os-text-dim); margin-top: 1px; }

    /* Section headers */
    h2.section-title {
      font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
      margin: 0 0 4px 0;
      display: flex; align-items: baseline; gap: 12px;
    }
    h2 .count {
      font-size: 13px; color: var(--os-text-muted); font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .section-sub {
      font-size: 12px; color: var(--os-text-dim); margin-bottom: 16px;
    }

    /* Connection cards */
    .conn-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }
    .conn-card {
      background: var(--os-card);
      border: 1px solid var(--os-border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .conn-card-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 8px;
    }
    .conn-name {
      font-size: 15px; font-weight: 600; color: var(--os-text);
      letter-spacing: -0.01em;
    }
    .conn-provider {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--os-border);
    }
    .conn-provider[data-pid="amazonbedrock"]    { color: var(--c-amazonbedrock); border-color: rgba(255,153,0,0.3); background: rgba(255,153,0,0.06); }
    .conn-provider[data-pid="azureopenai"]      { color: var(--c-azureopenai);   border-color: rgba(0,164,239,0.3); background: rgba(0,164,239,0.06); }
    .conn-provider[data-pid="anthropic"]        { color: var(--c-anthropic);     border-color: rgba(233,78,171,0.3); background: rgba(233,78,171,0.06); }
    .conn-provider[data-pid="customconnection"] { color: var(--c-customconnection); }
    .conn-entitlement {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 2px 8px; border-radius: 4px;
    }
    .conn-entitlement.trial    { background: rgba(251,191,36,0.10); color: var(--c-trial); border: 1px solid rgba(251,191,36,0.3); }
    .conn-entitlement.customer { background: rgba(52,211,153,0.10); color: var(--c-customer); border: 1px solid rgba(52,211,153,0.3); }
    .conn-desc { font-size: 12px; color: var(--os-text-muted); line-height: 1.5; }
    .conn-foot {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--os-text-dim);
      margin-top: 4px;
    }

    /* Agents table */
    .agents-section { background: var(--os-bg-2); border: 1px solid var(--os-border); border-radius: 14px; padding: 18px 18px; }
    .agents-controls {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .search {
      flex: 1; min-width: 200px;
      background: var(--os-card); border: 1px solid var(--os-border);
      border-radius: 8px; color: var(--os-text);
      padding: 8px 12px; font-size: 13px; font-family: inherit;
      outline: none;
    }
    .search:focus { border-color: var(--os-red); box-shadow: 0 0 0 3px var(--os-red-glow); }
    .filter-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      background: var(--os-card); border: 1px solid var(--os-border);
      border-radius: 7px; font-size: 12px; cursor: pointer;
      color: var(--os-text-muted);
      user-select: none;
    }
    .filter-toggle:hover { color: var(--os-text); }
    .filter-toggle.on { background: rgba(255,61,82,0.12); border-color: var(--os-red); color: var(--os-red); }
    .filter-toggle input { display: none; }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--os-text-muted); font-weight: 600;
      padding: 8px 10px;
      border-bottom: 1px solid var(--os-border);
      background: var(--os-bg-2);
      cursor: pointer;
      user-select: none;
    }
    th.sortable::after { content: " ↕"; opacity: 0.3; }
    th.sortable.asc::after { content: " ↑"; opacity: 1; color: var(--os-red); }
    th.sortable.desc::after { content: " ↓"; opacity: 1; color: var(--os-red); }
    td {
      padding: 10px;
      border-bottom: 1px solid var(--os-border);
      vertical-align: top;
    }
    tr:hover td { background: var(--os-card); }
    .agent-name {
      font-weight: 500; color: var(--os-text);
      display: flex; align-items: center; gap: 6px;
    }
    .agent-desc {
      font-size: 11px; color: var(--os-text-dim);
      margin-top: 3px; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    td.date  { color: var(--os-text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    td.owner { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--os-text-muted); }
    .badge {
      display: inline-flex; align-items: center;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 2px 6px; border-radius: 3px;
      margin-left: 5px;
    }
    .badge.test  { background: rgba(251,146,60,0.12); color: var(--c-test);  border: 1px solid rgba(251,146,60,0.3); }
    .badge.stale { background: rgba(155,155,168,0.10); color: var(--c-stale); border: 1px solid rgba(155,155,168,0.3); }
    .badge.pub   { background: rgba(96,165,250,0.12); color: var(--c-public); border: 1px solid rgba(96,165,250,0.3); }
    .empty-row { text-align: center; padding: 40px 0; color: var(--os-text-dim); font-size: 13px; }

    /* Foot */
    .foot {
      margin-top: 36px; padding-top: 18px;
      border-top: 1px solid var(--os-border);
      font-size: 11px; color: var(--os-text-dim);
      display: flex; justify-content: space-between;
    }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <template id="tpl-app">
    <div class="page">
      <header class="brand">
        <div class="brand-mark">AI</div>
        <div>
          <div class="brand-name">AI Agent Landscape</div>
          <div class="brand-sub">OutSystems · inventory + governance</div>
        </div>
      </header>

      <h1 class="title" id="t-title">—</h1>
      <div class="title-sub" id="t-sub">—</div>

      <section class="stats">
        <div class="stat" style="--accent: var(--c-agents)">
          <div class="stat-label">Agents</div>
          <div class="stat-value" id="s-agents">—</div>
          <div class="stat-detail">total</div>
        </div>
        <div class="stat" style="--accent: var(--c-conns)">
          <div class="stat-label">Connections</div>
          <div class="stat-value" id="s-conns">—</div>
          <div class="stat-detail">AI models</div>
        </div>
        <div class="stat" style="--accent: var(--c-trial)">
          <div class="stat-label">Trial</div>
          <div class="stat-value" id="s-trial">—</div>
          <div class="stat-detail">dev-only</div>
        </div>
        <div class="stat" style="--accent: var(--c-customer)">
          <div class="stat-label">Customer</div>
          <div class="stat-value" id="s-customer">—</div>
          <div class="stat-detail">paid keys</div>
        </div>
        <div class="stat" style="--accent: var(--c-public)">
          <div class="stat-label">Public agents</div>
          <div class="stat-value" id="s-public">—</div>
          <div class="stat-detail">callable externally</div>
        </div>
        <div class="stat" style="--accent: var(--c-test)">
          <div class="stat-label">Test / demo</div>
          <div class="stat-value" id="s-test">—</div>
          <div class="stat-detail">name heuristic</div>
        </div>
        <div class="stat" style="--accent: var(--c-stale)">
          <div class="stat-label">Stale</div>
          <div class="stat-value" id="s-stale">—</div>
          <div class="stat-detail">>180 days</div>
        </div>
      </section>

      <h2 class="section-title">AI Model Connections <span class="count" id="conn-count">—</span></h2>
      <div class="section-sub">Trial models are dev-only and forbid personal data per their terms. Customer connections use your own paid keys.</div>
      <div class="conn-grid" id="conn-grid"></div>

      <h2 class="section-title">AI Agents <span class="count" id="agents-count">—</span></h2>
      <div class="section-sub">Each agent is its own deployable unit. Names matching <code style="font-family:'JetBrains Mono',monospace;background:var(--os-card);padding:1px 4px;border-radius:3px;font-size:11px;border:1px solid var(--os-border);">test/tmp/demo/123/xxx</code> are flagged for cleanup.</div>

      <div class="agents-section">
        <div class="agents-controls">
          <input class="search" id="search" type="text" placeholder="Search agents by name or description…" />
          <label class="filter-toggle" id="ft-public"><input type="checkbox" /> Public only</label>
          <label class="filter-toggle" id="ft-hide-test"><input type="checkbox" checked /> Hide test/demo</label>
          <label class="filter-toggle" id="ft-hide-stale"><input type="checkbox" /> Hide stale</label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="sortable" data-col="n">Name</th>
                <th class="sortable" data-col="owner">Owner</th>
                <th class="sortable desc" data-col="date">Updated</th>
                <th>Flags</th>
              </tr>
            </thead>
            <tbody id="agents-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="foot">
        <span id="f-tenant">—</span>
        <span>Generated by <code style="font-family:'JetBrains Mono',monospace;">outsystems-ai-agent-landscape</code> v1.0.0</span>
      </div>
    </div>
  </template>

  <template id="tpl-empty">
    <div class="empty-state">
      <div class="mark">AI</div>
      <h1>Template not yet populated</h1>
      <p>This is the bare <code>template.html</code> shipped with the
      <code>outsystems-ai-agent-landscape</code> skill. Run the skill through
      Claude Code to populate it with your AI inventory.</p>
      <p style="font-size: 12px;">Expected placeholder: <code>/*__LANDSCAPE_DATA__*/</code>.</p>
    </div>
  </template>

  <script>
    const LANDSCAPE_DATA = /*__LANDSCAPE_DATA__*/null;

    const root = document.getElementById('app-root');
    if (!LANDSCAPE_DATA || !LANDSCAPE_DATA.stats) {
      root.appendChild(document.getElementById('tpl-empty').content.cloneNode(true));
    } else {
      root.appendChild(document.getElementById('tpl-app').content.cloneNode(true));
      boot();
    }

    function boot() {
      const D = LANDSCAPE_DATA;
      const S = D.stats;

      document.title = `AI Landscape · ${S.totalAgents} agents · ${S.totalConnections} models`;

      // Title + sub
      const tid = (D.tenant.id || '').slice(0, 8);
      document.getElementById('t-title').textContent = `${S.totalAgents} AI agents, ${S.totalConnections} model connections`;
      const providersText = S.providers.map(p => `${p.count} ${p.name}`).join(' · ');
      document.getElementById('t-sub').textContent = `Tenant ${tid}… · ${providersText}`;

      // Stats
      document.getElementById('s-agents').textContent   = S.totalAgents;
      document.getElementById('s-conns').textContent    = S.totalConnections;
      document.getElementById('s-trial').textContent    = S.trialConns;
      document.getElementById('s-customer').textContent = S.customerConns;
      document.getElementById('s-public').textContent   = S.publicAgents;
      document.getElementById('s-test').textContent     = S.testDemoAgents;
      document.getElementById('s-stale').textContent    = S.staleAgents;

      // ----- Connection cards -----
      const grid = document.getElementById('conn-grid');
      document.getElementById('conn-count').textContent = `${D.connections.length} total`;
      D.connections.forEach(c => {
        const card = document.createElement('div');
        card.className = 'conn-card';
        const ent = (c.entitlement || '').toLowerCase();
        card.innerHTML = `
          <div class="conn-card-head">
            <div>
              <div class="conn-name">${esc(c.n)}</div>
              <div class="conn-foot" style="margin-top:6px;">
                <span class="conn-entitlement ${ent}">${esc(c.entitlement)}</span>
                <span>${esc(c.date || '—')}</span>
              </div>
            </div>
            <span class="conn-provider" data-pid="${esc(c.providerId)}">${esc(c.provider)}</span>
          </div>
          <div class="conn-desc">${esc(c.desc || '—')}</div>
        `;
        grid.appendChild(card);
      });

      // ----- Agents table -----
      const tbody = document.getElementById('agents-tbody');
      document.getElementById('agents-count').textContent = `${D.agents.length} total`;

      const filters = {
        search: '',
        publicOnly: false,
        hideTest: true,
        hideStale: false,
      };
      let sortCol = 'date';
      let sortDir = 'desc';  // newest first

      document.getElementById('search').addEventListener('input', e => {
        filters.search = e.target.value.toLowerCase().trim();
        render();
      });
      bindToggle('ft-public', 'publicOnly');
      bindToggle('ft-hide-test', 'hideTest');
      bindToggle('ft-hide-stale', 'hideStale');

      function bindToggle(id, key) {
        const el = document.getElementById(id);
        const input = el.querySelector('input');
        const update = () => {
          filters[key] = input.checked;
          el.classList.toggle('on', input.checked);
          render();
        };
        el.addEventListener('click', e => {
          if (e.target !== input) { input.checked = !input.checked; update(); }
        });
        input.addEventListener('change', update);
        update();
      }

      // Sort header binding
      document.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (sortCol === col) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            sortCol = col;
            sortDir = 'asc';
          }
          document.querySelectorAll('th.sortable').forEach(t => t.classList.remove('asc', 'desc'));
          th.classList.add(sortDir);
          render();
        });
      });

      function render() {
        let rows = D.agents.filter(a => {
          if (filters.publicOnly && !a.pub) return false;
          if (filters.hideTest && a.isTestDemo) return false;
          if (filters.hideStale && a.isStale) return false;
          if (filters.search) {
            const q = filters.search;
            if (!a.n.toLowerCase().includes(q) &&
                !(a.desc || '').toLowerCase().includes(q)) return false;
          }
          return true;
        });

        rows.sort((x, y) => {
          let a, b;
          if (sortCol === 'n')     { a = x.n.toLowerCase();     b = y.n.toLowerCase(); }
          else if (sortCol === 'owner') { a = x.owner; b = y.owner; }
          else if (sortCol === 'date')  { a = x.date || '';     b = y.date || ''; }
          else                          { a = '';               b = ''; }
          const cmp = a < b ? -1 : a > b ? 1 : 0;
          return sortDir === 'asc' ? cmp : -cmp;
        });

        tbody.innerHTML = '';
        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty-row">No agents match the current filters.</td></tr>';
          return;
        }
        rows.forEach(a => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div class="agent-name">${esc(a.n)}</div>
              <div class="agent-desc">${esc(a.desc || '—')}</div>
            </td>
            <td class="owner">${esc((a.owner || '').slice(0,8))}…</td>
            <td class="date">${esc(a.date || '—')}</td>
            <td>
              ${a.pub ? '<span class="badge pub">Public</span>' : ''}
              ${a.isTestDemo ? '<span class="badge test">Test</span>' : ''}
              ${a.isStale ? '<span class="badge stale">Stale</span>' : ''}
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      // Initial render
      document.querySelector(`th[data-col="${sortCol}"]`).classList.add(sortDir);
      render();

      document.getElementById('f-tenant').textContent = `Tenant ${D.tenant.id}`;
    }

    function esc(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
