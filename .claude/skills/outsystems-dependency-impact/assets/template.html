<!DOCTYPE html>
<!--
  template-version: 1.0.0
  Generated by the `outsystems-dependency-impact` skill.
  Populate via `scripts/build.py <cache-dir> <output-path> --assets ... --refs-dir ... --tenant-assets ...`.
  Placeholder: /*__IMPACT_DATA__*/
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OutSystems Dependency Impact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --os-bg: #0A0A0F;
      --os-bg-2: #11111A;
      --os-card: #161620;
      --os-card-2: #1C1C28;
      --os-border: #262633;
      --os-border-strong: #353548;
      --os-text: #F5F5F7;
      --os-text-muted: #9B9BA8;
      --os-text-dim: #6B6B7A;
      --os-red: #FF3D52;
      --os-red-dark: #C42030;
      --os-red-glow: rgba(255, 61, 82, 0.18);

      --c-target: #B57BFF;
      --c-app: #FF8DA0;
      --c-edge: #60A5FA;
      --c-scanned: #34D399;
      --c-failed: #FB923C;
      --c-gap-good: #34D399;
      --c-gap-soft: #FBBF24;
      --c-gap-loud: #FB923C;
      --c-gap-loud2: #FF3D52;

      --c-eSpace: #3B82F6;
      --c-Extension: #22D3EE;
      --c-AIModelConnection: #E94EAB;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--os-bg);
      color: var(--os-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; letter-spacing: -0.01em;
      min-height: 100vh;
    }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px; padding: 40px; text-align: center;
    }
    .empty-state .mark {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: white; font-size: 28px;
      box-shadow: 0 10px 40px var(--os-red-glow);
    }
    .empty-state h1 { font-size: 20px; font-weight: 700; margin: 0; }
    .empty-state p { color: var(--os-text-muted); max-width: 500px; line-height: 1.55; }
    .empty-state code {
      background: var(--os-card); padding: 2px 8px; border-radius: 5px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      border: 1px solid var(--os-border); color: var(--os-text);
    }

    .page { max-width: 1320px; margin: 0 auto; padding: 32px 32px 64px; }

    header.brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px;
    }
    .brand-mark {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px var(--os-red-glow);
      font-weight: 800; color: white; font-size: 18px;
    }
    .brand-name { font-size: 16px; font-weight: 700; }
    .brand-sub  { font-size: 12px; color: var(--os-text-muted); margin-top: 2px; }

    h1.title {
      font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
      margin: 0 0 6px 0;
    }
    .title-sub {
      font-size: 13px; color: var(--os-text-muted); margin-bottom: 28px;
    }

    .stats {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 10px; margin-bottom: 28px;
    }
    .stat {
      background: linear-gradient(180deg, var(--os-card) 0%, var(--os-card-2) 100%);
      border: 1px solid var(--os-border);
      border-radius: 10px;
      padding: 12px 14px;
      position: relative; overflow: hidden;
    }
    .stat::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent, var(--os-red));
    }
    .stat-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--os-text-muted); font-weight: 600;
    }
    .stat-value {
      font-size: 22px; font-weight: 700; margin-top: 4px;
      font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
    }
    .stat-detail { font-size: 10px; color: var(--os-text-dim); margin-top: 1px; }

    /* Two-column layout: targets list (left) + selected target detail (right) */
    .explorer {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      min-height: 500px;
    }

    /* Left panel: search + sorted target list */
    .targets-panel {
      background: var(--os-bg-2);
      border: 1px solid var(--os-border);
      border-radius: 14px;
      display: flex; flex-direction: column;
      max-height: 78vh;
      overflow: hidden;
    }
    .targets-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--os-border);
    }
    .targets-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--os-text-muted); font-weight: 600;
      margin-bottom: 10px;
    }
    .search {
      width: 100%;
      background: var(--os-card); border: 1px solid var(--os-border);
      border-radius: 8px; color: var(--os-text);
      padding: 8px 12px; font-size: 13px; font-family: inherit;
      outline: none;
    }
    .search:focus { border-color: var(--os-red); box-shadow: 0 0 0 3px var(--os-red-glow); }
    .targets-list {
      overflow-y: auto;
      padding: 8px;
    }
    .target-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 10px;
      border-radius: 7px;
      cursor: pointer;
      user-select: none;
      gap: 8px;
    }
    .target-row:hover { background: var(--os-card); }
    .target-row.selected {
      background: rgba(181,123,255,0.12);
      border: 1px solid rgba(181,123,255,0.36);
    }
    .target-row .tr-left {
      display: flex; flex-direction: column; min-width: 0;
    }
    .target-row .tr-name {
      font-size: 13px; font-weight: 500; color: var(--os-text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .target-row .tr-kind {
      font-size: 10px; color: var(--os-text-dim);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-top: 2px;
    }
    .target-row .tr-count {
      font-size: 12px; color: var(--os-text-muted);
      font-variant-numeric: tabular-nums;
      background: var(--os-card); padding: 2px 8px; border-radius: 999px;
      border: 1px solid var(--os-border);
      white-space: nowrap;
    }
    .target-row.selected .tr-count { background: rgba(181,123,255,0.18); border-color: rgba(181,123,255,0.36); color: var(--c-target); }
    .empty-list {
      padding: 24px 12px; text-align: center;
      font-size: 12px; color: var(--os-text-dim);
    }

    /* Right panel: selected target detail */
    .detail-panel {
      background: var(--os-bg-2);
      border: 1px solid var(--os-border);
      border-radius: 14px;
      padding: 22px 24px;
      display: flex; flex-direction: column;
    }
    .detail-head { margin-bottom: 18px; }
    .detail-kind {
      display: inline-block;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 3px 8px; border-radius: 4px;
      background: var(--os-card); border: 1px solid var(--os-border);
      color: var(--os-text-muted);
      margin-bottom: 8px;
    }
    .detail-kind[data-kind="eSpace"]            { color: var(--c-eSpace); border-color: rgba(59,130,246,0.36); background: rgba(59,130,246,0.06); }
    .detail-kind[data-kind="Extension"]         { color: var(--c-Extension); border-color: rgba(34,211,238,0.36); background: rgba(34,211,238,0.06); }
    .detail-kind[data-kind="AIModelConnection"] { color: var(--c-AIModelConnection); border-color: rgba(233,78,171,0.36); background: rgba(233,78,171,0.06); }
    .detail-name {
      font-size: 22px; font-weight: 700; margin: 0 0 4px 0;
      letter-spacing: -0.02em;
    }
    .detail-meta { font-size: 12px; color: var(--os-text-muted); }
    .detail-meta .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      background: var(--os-card); border: 1px solid var(--os-border);
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--os-text);
      margin-left: 6px;
    }

    .users-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin: 18px 0 8px 0;
    }
    .users-title {
      font-size: 13px; font-weight: 600; color: var(--os-text);
    }
    .users-count {
      font-size: 12px; color: var(--os-text-muted); font-variant-numeric: tabular-nums;
    }
    .users-table-wrap { overflow-x: auto; }
    table.users {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    table.users th {
      text-align: left;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--os-text-muted); font-weight: 600;
      padding: 8px 10px;
      border-bottom: 1px solid var(--os-border);
      cursor: pointer; user-select: none;
    }
    table.users th.sortable::after { content: " ↕"; opacity: 0.3; }
    table.users th.sortable.asc::after { content: " ↑"; opacity: 1; color: var(--os-red); }
    table.users th.sortable.desc::after { content: " ↓"; opacity: 1; color: var(--os-red); }
    table.users td {
      padding: 10px;
      border-bottom: 1px solid var(--os-border);
    }
    table.users tr:hover td { background: var(--os-card); }
    .app-name { font-weight: 500; color: var(--os-text); }
    .app-type { font-size: 10px; color: var(--os-text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .rev-cell { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--os-text-muted); font-variant-numeric: tabular-nums; }
    .gap-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      font-variant-numeric: tabular-nums;
    }
    .gap-badge.good  { background: rgba(52,211,153,0.10);  color: var(--c-gap-good); }
    .gap-badge.soft  { background: rgba(251,191,36,0.10);  color: var(--c-gap-soft); }
    .gap-badge.loud  { background: rgba(251,146,60,0.12);  color: var(--c-gap-loud); }
    .gap-badge.loud2 { background: rgba(255,61,82,0.12);   color: var(--c-gap-loud2); }
    .gap-badge.unknown { background: var(--os-card); color: var(--os-text-dim); border: 1px solid var(--os-border); }

    .detail-empty {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      color: var(--os-text-dim); font-size: 13px;
      padding: 60px 20px; text-align: center;
    }

    /* Foot */
    .foot {
      margin-top: 28px; padding-top: 14px;
      border-top: 1px solid var(--os-border);
      font-size: 11px; color: var(--os-text-dim);
      display: flex; justify-content: space-between;
    }

    /* Scrollbar */
    .targets-list::-webkit-scrollbar { width: 6px; }
    .targets-list::-webkit-scrollbar-track { background: transparent; }
    .targets-list::-webkit-scrollbar-thumb { background: var(--os-border-strong); border-radius: 3px; }

    @media (max-width: 900px) {
      .explorer { grid-template-columns: 1fr; }
      .targets-panel { max-height: 50vh; }
    }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <template id="tpl-app">
    <div class="page">
      <header class="brand">
        <div class="brand-mark">D</div>
        <div>
          <div class="brand-name">Dependency Impact</div>
          <div class="brand-sub">OutSystems · tenant-wide reverse dependency explorer</div>
        </div>
      </header>

      <h1 class="title" id="t-title">—</h1>
      <div class="title-sub" id="t-sub">—</div>

      <section class="stats">
        <div class="stat" style="--accent: var(--c-app)">
          <div class="stat-label">Consumer assets</div>
          <div class="stat-value" id="s-consumers">—</div>
          <div class="stat-detail">in scan list</div>
        </div>
        <div class="stat" style="--accent: var(--c-scanned)">
          <div class="stat-label">Scanned</div>
          <div class="stat-value" id="s-scanned">—</div>
          <div class="stat-detail">app_refs succeeded</div>
        </div>
        <div class="stat" style="--accent: var(--c-failed)">
          <div class="stat-label">Failed</div>
          <div class="stat-value" id="s-failed">—</div>
          <div class="stat-detail">timeout / error</div>
        </div>
        <div class="stat" style="--accent: var(--c-target)">
          <div class="stat-label">Unique targets</div>
          <div class="stat-value" id="s-targets">—</div>
          <div class="stat-detail">referenced libs/agents</div>
        </div>
        <div class="stat" style="--accent: var(--c-edge)">
          <div class="stat-label">Edges</div>
          <div class="stat-value" id="s-edges">—</div>
          <div class="stat-detail">total dep links</div>
        </div>
      </section>

      <div class="explorer">
        <div class="targets-panel">
          <div class="targets-head">
            <div class="targets-title">Targets <span id="targets-shown" style="text-transform:none;color:var(--os-text-dim);font-weight:500;">(0)</span></div>
            <input class="search" id="search" type="text" placeholder="Search by name (library, agent, connection)…" />
          </div>
          <div class="targets-list" id="targets-list"></div>
        </div>

        <div class="detail-panel" id="detail-panel">
          <div class="detail-empty" id="detail-empty">Select a target on the left to see what depends on it.</div>
        </div>
      </div>

      <div class="foot">
        <span id="f-scanned-at">—</span>
        <span>Generated by <code style="font-family:'JetBrains Mono',monospace;">outsystems-dependency-impact</code> v1.0.0</span>
      </div>
    </div>
  </template>

  <template id="tpl-empty">
    <div class="empty-state">
      <div class="mark">D</div>
      <h1>Template not yet populated</h1>
      <p>This is the bare <code>template.html</code> shipped with the
      <code>outsystems-dependency-impact</code> skill. Run the skill
      through Claude Code to populate it with a fresh tenant scan.</p>
      <p style="font-size: 12px;">Expected placeholder: <code>/*__IMPACT_DATA__*/</code>.</p>
    </div>
  </template>

  <script>
    const IMPACT_DATA = /*__IMPACT_DATA__*/null;

    const root = document.getElementById('app-root');
    if (!IMPACT_DATA || !IMPACT_DATA.stats) {
      root.appendChild(document.getElementById('tpl-empty').content.cloneNode(true));
    } else {
      root.appendChild(document.getElementById('tpl-app').content.cloneNode(true));
      boot();
    }

    function boot() {
      const D = IMPACT_DATA;
      const S = D.stats;

      document.title = `Dependency Impact · ${S.targetCount} targets · ${S.edgeCount} edges`;

      document.getElementById('t-title').textContent =
        `${S.targetCount} dependency targets across ${S.scannedCount} consumer assets`;
      const scanDate = D.tenant.scannedAt
        ? new Date(D.tenant.scannedAt * 1000).toISOString().slice(0,10)
        : '—';
      document.getElementById('t-sub').textContent =
        `Scanned ${scanDate} · ${S.edgeCount} dependency edges catalogued${S.failedCount > 0 ? ` · ${S.failedCount} asset(s) could not be analyzed (likely timeout on large OML)` : ''}`;
      document.getElementById('f-scanned-at').textContent = `Scan: ${scanDate}`;

      document.getElementById('s-consumers').textContent = S.consumerAssetCount;
      document.getElementById('s-scanned').textContent   = S.scannedCount;
      document.getElementById('s-failed').textContent    = S.failedCount;
      document.getElementById('s-targets').textContent   = S.targetCount;
      document.getElementById('s-edges').textContent     = S.edgeCount;

      // Build sorted target list (most-used first)
      const allTargets = Object.entries(D.byTarget).map(([k, v]) => ({
        k, n: v.n, kind: v.kind,
        currentRev: v.currentRev,
        users: v.users,
        count: v.users.length,
      }));
      allTargets.sort((a, b) =>
        b.count - a.count || a.n.toLowerCase().localeCompare(b.n.toLowerCase())
      );

      const listEl  = document.getElementById('targets-list');
      const shownEl = document.getElementById('targets-shown');
      const searchEl = document.getElementById('search');

      let selectedKey = null;
      let userSort = { col: 'gap', dir: 'desc' };

      function renderList() {
        const q = (searchEl.value || '').trim().toLowerCase();
        listEl.innerHTML = '';
        const shown = allTargets.filter(t =>
          !q || t.n.toLowerCase().includes(q) || (t.kind || '').toLowerCase().includes(q)
        );
        shownEl.textContent = `(${shown.length})`;
        if (shown.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-list';
          empty.textContent = q ? 'No targets match.' : 'No targets in scan.';
          listEl.appendChild(empty);
          return;
        }
        shown.forEach(t => {
          const row = document.createElement('div');
          row.className = 'target-row' + (t.k === selectedKey ? ' selected' : '');
          row.innerHTML = `
            <div class="tr-left">
              <div class="tr-name">${esc(t.n)}</div>
              <div class="tr-kind">${esc(t.kind || '?')}</div>
            </div>
            <div class="tr-count">${t.count}</div>
          `;
          row.addEventListener('click', () => {
            selectedKey = t.k;
            renderList();
            renderDetail(t);
          });
          listEl.appendChild(row);
        });
      }

      function classifyGap(gap) {
        if (gap === null || gap === undefined) return 'unknown';
        if (gap <= 0)   return 'good';
        if (gap <= 5)   return 'soft';
        if (gap <= 50)  return 'loud';
        return 'loud2';
      }

      function renderDetail(t) {
        const panel = document.getElementById('detail-panel');
        panel.innerHTML = `
          <div class="detail-head">
            <div class="detail-kind" data-kind="${esc(t.kind || '')}">${esc(t.kind || 'unknown kind')}</div>
            <h2 class="detail-name">${esc(t.n)}</h2>
            <div class="detail-meta">
              Tenant has this asset at
              <span class="pill">${t.currentRev !== null && t.currentRev !== undefined ? 'r' + t.currentRev : 'unknown rev'}</span>
              <span class="pill">${(t.k || '').slice(0,8)}…</span>
            </div>
          </div>
          <div class="users-head">
            <div class="users-title">Apps depending on this</div>
            <div class="users-count">${t.users.length} dependent${t.users.length === 1 ? '' : 's'}</div>
          </div>
          <div class="users-table-wrap">
            <table class="users">
              <thead>
                <tr>
                  <th class="sortable" data-col="n">App</th>
                  <th class="sortable" data-col="t">Type</th>
                  <th class="sortable" data-col="usedRev">Built against</th>
                  <th class="sortable desc" data-col="gap">Gap from current</th>
                </tr>
              </thead>
              <tbody id="users-tbody"></tbody>
            </table>
          </div>
        `;
        const tbody = document.getElementById('users-tbody');
        const rows = t.users.slice();
        sortUsers(rows);
        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px 0;color:var(--os-text-dim);">No dependents.</td></tr>';
        } else {
          rows.forEach(u => {
            const gapCls = classifyGap(u.gap);
            const gapText = u.gap === null || u.gap === undefined ? '—' :
              u.gap === 0 ? 'in sync' :
              u.gap > 0 ? '+' + u.gap + ' rev' + (u.gap === 1 ? '' : 's') + ' behind' :
              u.gap + ' rev ahead';
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>
                <div class="app-name">${esc(u.n)}</div>
                <div class="app-type">${(u.k || '').slice(0,8)}…</div>
              </td>
              <td><span class="app-type" style="margin-top:0;">${esc(u.t || '?')}</span></td>
              <td><span class="rev-cell">${u.usedRev !== null && u.usedRev !== undefined ? 'r' + u.usedRev : '—'}</span></td>
              <td><span class="gap-badge ${gapCls}">${esc(gapText)}</span></td>
            `;
            tbody.appendChild(tr);
          });
        }
        // Sort header binding
        document.querySelectorAll('table.users th.sortable').forEach(th => {
          th.addEventListener('click', () => {
            const col = th.dataset.col;
            if (userSort.col === col) {
              userSort.dir = userSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
              userSort = { col, dir: 'asc' };
            }
            renderDetail(t);
          });
        });
        // Reflect sort header state
        const th = document.querySelector(`table.users th[data-col="${userSort.col}"]`);
        if (th) th.classList.add(userSort.dir);
      }

      function sortUsers(rows) {
        const c = userSort.col, d = userSort.dir;
        rows.sort((x, y) => {
          let a = x[c], b = y[c];
          if (typeof a === 'string') a = a.toLowerCase();
          if (typeof b === 'string') b = b.toLowerCase();
          // Treat null/undefined as last
          if (a === null || a === undefined) return d === 'asc' ? 1 : -1;
          if (b === null || b === undefined) return d === 'asc' ? -1 : 1;
          if (a < b) return d === 'asc' ? -1 : 1;
          if (a > b) return d === 'asc' ?  1 : -1;
          return 0;
        });
      }

      searchEl.addEventListener('input', renderList);

      // Auto-select the most-depended-on target on load
      renderList();
      if (allTargets.length) {
        selectedKey = allTargets[0].k;
        renderList();
        renderDetail(allTargets[0]);
      }
    }

    function esc(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
