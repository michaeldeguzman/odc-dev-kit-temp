<!DOCTYPE html>
<!--
  template-version: 1.0.0
  Generated by the `outsystems-app-architecture` skill.
  Populate via `scripts/build.py <cache-dir> <output-path> --app-info ... etc.`.
  Placeholder: /*__APP_DATA__*/
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OutSystems App Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --os-bg: #0A0A0F;
      --os-bg-2: #11111A;
      --os-card: #161620;
      --os-card-2: #1C1C28;
      --os-border: #262633;
      --os-border-strong: #353548;
      --os-text: #F5F5F7;
      --os-text-muted: #9B9BA8;
      --os-text-dim: #6B6B7A;
      --os-red: #FF3D52;
      --os-red-dark: #C42030;
      --os-red-glow: rgba(255, 61, 82, 0.18);

      --c-app: #FF3D52;
      --c-uiflow: #FBBF24;
      --c-screen: #FF8DA0;
      --c-action: #60A5FA;
      --c-function: #A78BFA;
      --c-entity: #34D399;
      --c-enum: #14B8A6;
      --c-structure: #22D3EE;
      --c-role: #FB923C;
      --c-inherited: #5B5B6E;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--os-bg);
      color: var(--os-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      letter-spacing: -0.01em;
      overflow: hidden;
    }
    .app { display: grid; grid-template-rows: auto auto 1fr; height: 100vh; }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; gap: 16px; padding: 40px; text-align: center;
    }
    .empty-state .mark {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: white; font-size: 28px;
      box-shadow: 0 10px 40px var(--os-red-glow);
    }
    .empty-state h1 { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
    .empty-state p { color: var(--os-text-muted); max-width: 500px; line-height: 1.55; font-size: 14px; }
    .empty-state code {
      background: var(--os-card); padding: 2px 8px; border-radius: 5px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      border: 1px solid var(--os-border); color: var(--os-text);
    }

    /* Header */
    header.topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px;
      background: linear-gradient(180deg, #0E0E16 0%, #0A0A0F 100%);
      border-bottom: 1px solid var(--os-border);
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-mark {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px var(--os-red-glow);
      font-weight: 800; color: white; font-size: 18px;
    }
    .brand-name { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .brand-sub { font-size: 12px; color: var(--os-text-muted); margin-top: 2px; }
    .header-meta { display: flex; gap: 22px; align-items: center; }
    .meta-item { display: flex; flex-direction: column; }
    .meta-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--os-text-dim); font-weight: 600;
    }
    .meta-value { font-size: 13px; color: var(--os-text); font-weight: 500; margin-top: 3px; }
    .meta-value.pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--os-card-2); border: 1px solid var(--os-border);
      padding: 3px 10px; border-radius: 999px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
    }
    .pulse {
      width: 7px; height: 7px; border-radius: 50%;
      background: #34D399;
      box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
      70% { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 10px;
      padding: 14px 28px;
      background: var(--os-bg);
      border-bottom: 1px solid var(--os-border);
    }
    .stat {
      background: linear-gradient(180deg, var(--os-card) 0%, var(--os-card-2) 100%);
      border: 1px solid var(--os-border);
      border-radius: 10px;
      padding: 10px 12px;
      position: relative; overflow: hidden;
    }
    .stat::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent, var(--os-red));
    }
    .stat-label {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--os-text-muted); font-weight: 600;
    }
    .stat-value {
      font-size: 22px; font-weight: 700; color: var(--os-text);
      margin-top: 4px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
    }
    .stat-detail { font-size: 10px; color: var(--os-text-dim); margin-top: 1px; }

    /* Main */
    main {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100%;
      overflow: hidden;
    }
    aside.sidebar {
      background: var(--os-bg-2);
      border-right: 1px solid var(--os-border);
      padding: 18px 18px;
      overflow-y: auto;
    }
    .panel-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--os-text-muted); font-weight: 600;
      margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title button {
      background: none; border: none; color: var(--os-red);
      font-size: 10px; letter-spacing: 0.08em; cursor: pointer; font-weight: 600;
    }
    .panel-title button:hover { color: #ff7184; }

    .search {
      width: 100%;
      background: var(--os-card); border: 1px solid var(--os-border);
      border-radius: 8px; color: var(--os-text);
      padding: 8px 12px; font-size: 13px; font-family: inherit;
      margin-bottom: 18px; outline: none;
    }
    .search:focus { border-color: var(--os-red); box-shadow: 0 0 0 3px var(--os-red-glow); }

    .filter-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 22px; }
    .filter-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 8px; border-radius: 7px;
      cursor: pointer; user-select: none;
      transition: background 120ms;
    }
    .filter-row:hover { background: var(--os-card); }
    .filter-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .filter-row .filter-name { flex: 1; font-size: 13px; color: var(--os-text); }
    .filter-row.is-off .filter-name { color: var(--os-text-dim); text-decoration: line-through; opacity: 0.6; }
    .filter-row.is-off .filter-swatch { opacity: 0.35; }
    .filter-count {
      font-size: 11px; color: var(--os-text-muted);
      font-variant-numeric: tabular-nums;
      background: var(--os-card); padding: 2px 7px; border-radius: 999px;
      border: 1px solid var(--os-border);
    }
    .filter-row.is-off .filter-count { opacity: 0.4; }

    .ctx-block {
      background: var(--os-card); border: 1px solid var(--os-border);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 12px;
    }
    .ctx-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; gap: 12px; }
    .ctx-row + .ctx-row { border-top: 1px solid var(--os-border); }
    .ctx-key { color: var(--os-text-muted); }
    .ctx-val { color: var(--os-text); font-weight: 500; }

    /* Graph */
    .graph-wrap {
      position: relative;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 61, 82, 0.04) 0%, transparent 60%),
        var(--os-bg);
      overflow: hidden;
    }
    #network { width: 100%; height: 100%; }
    .graph-overlay {
      position: absolute; top: 16px; right: 16px;
      background: rgba(15, 15, 22, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid var(--os-border);
      border-radius: 10px;
      padding: 14px 16px;
      max-width: 340px;
      pointer-events: none;
      opacity: 0; transition: opacity 150ms;
    }
    .graph-overlay.is-visible { opacity: 1; }
    .overlay-title {
      font-size: 14px; font-weight: 600; color: var(--os-text);
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .overlay-type {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--os-text-dim); margin-bottom: 8px;
    }
    .overlay-desc {
      font-size: 11px; color: var(--os-text-muted);
      line-height: 1.45; margin-bottom: 8px;
      max-height: 140px; overflow: hidden;
    }

    .legend-floating {
      position: absolute; bottom: 16px; left: 16px;
      background: rgba(15, 15, 22, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid var(--os-border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11px; color: var(--os-text-muted);
      display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
      max-width: calc(100% - 200px);
    }
    .legend-floating > div { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .graph-controls {
      position: absolute; bottom: 16px; right: 16px;
      display: flex; gap: 8px;
    }
    .ctrl-btn {
      background: rgba(15, 15, 22, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--os-border);
      color: var(--os-text);
      width: 36px; height: 36px; border-radius: 8px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 120ms;
    }
    .ctrl-btn:hover { border-color: var(--os-red); color: var(--os-red); }

    aside.sidebar::-webkit-scrollbar { width: 6px; }
    aside.sidebar::-webkit-scrollbar-track { background: transparent; }
    aside.sidebar::-webkit-scrollbar-thumb { background: var(--os-border-strong); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <template id="tpl-app">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" id="hdr-mark">A</div>
          <div>
            <div class="brand-name" id="hdr-name">App Architecture</div>
            <div class="brand-sub" id="hdr-sub">—</div>
          </div>
        </div>
        <div class="header-meta">
          <div class="meta-item">
            <span class="meta-label">App Key</span>
            <span class="meta-value pill" id="hdr-key">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Revision</span>
            <span class="meta-value" id="hdr-rev">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Type</span>
            <span class="meta-value" id="hdr-type">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Status</span>
            <span class="meta-value" style="display:flex;align-items:center;gap:8px;"><span class="pulse"></span>Live</span>
          </div>
        </div>
      </header>

      <section class="stats">
        <div class="stat" style="--accent: var(--c-uiflow)">
          <div class="stat-label">UI Flows</div>
          <div class="stat-value" id="stat-flows">—</div>
          <div class="stat-detail">screens grouped</div>
        </div>
        <div class="stat" style="--accent: var(--c-screen)">
          <div class="stat-label">Screens</div>
          <div class="stat-value" id="stat-screens">—</div>
          <div class="stat-detail">UI surfaces</div>
        </div>
        <div class="stat" style="--accent: var(--c-action)">
          <div class="stat-label">Actions</div>
          <div class="stat-value" id="stat-actions">—</div>
          <div class="stat-detail">server</div>
        </div>
        <div class="stat" style="--accent: var(--c-function)">
          <div class="stat-label">Functions</div>
          <div class="stat-value" id="stat-functions">—</div>
          <div class="stat-detail">inline-callable</div>
        </div>
        <div class="stat" style="--accent: var(--c-entity)">
          <div class="stat-label">Entities</div>
          <div class="stat-value" id="stat-entities">—</div>
          <div class="stat-detail">business data</div>
        </div>
        <div class="stat" style="--accent: var(--c-enum)">
          <div class="stat-label">Enums</div>
          <div class="stat-value" id="stat-enums">—</div>
          <div class="stat-detail">static</div>
        </div>
        <div class="stat" style="--accent: var(--c-structure)">
          <div class="stat-label">Structures</div>
          <div class="stat-value" id="stat-structures">—</div>
          <div class="stat-detail">DTOs</div>
        </div>
        <div class="stat" style="--accent: var(--c-role)">
          <div class="stat-label">Roles</div>
          <div class="stat-value" id="stat-roles">—</div>
          <div class="stat-detail">security</div>
        </div>
      </section>

      <main>
        <aside class="sidebar">
          <div class="panel-title"><span>App Context</span></div>
          <div class="ctx-block" id="ctx-block">
            <div class="ctx-row"><span class="ctx-key">Asset Key</span><span class="ctx-val" id="ctx-key" style="font-family:'JetBrains Mono',monospace;font-size:10px;">—</span></div>
            <div class="ctx-row"><span class="ctx-key">Type</span><span class="ctx-val" id="ctx-type">—</span></div>
            <div class="ctx-row"><span class="ctx-key">Revision</span><span class="ctx-val" id="ctx-rev">—</span></div>
            <div class="ctx-row"><span class="ctx-key">Updated</span><span class="ctx-val" id="ctx-date">—</span></div>
            <div class="ctx-row"><span class="ctx-key">Inherited items</span><span class="ctx-val" id="ctx-inherited">—</span></div>
          </div>

          <div class="panel-title">
            <span>Filter by Category</span>
            <button id="filter-reset">RESET</button>
          </div>
          <input class="search" id="search" type="text" placeholder="Search by name…" />
          <div class="filter-list" id="filter-list"></div>

          <div class="panel-title"><span>Layers</span></div>
          <div class="ctx-block" style="padding:10px 12px;font-size:11px;line-height:1.6;">
            <div style="color:var(--os-text-muted);"><strong style="color:var(--c-screen);">UI</strong> &nbsp;UI Flows → Screens</div>
            <div style="color:var(--os-text-muted);"><strong style="color:var(--c-action);">Logic</strong> &nbsp;Server Actions + Functions</div>
            <div style="color:var(--os-text-muted);"><strong style="color:var(--c-entity);">Data</strong> &nbsp;Entities · Enums · Structures</div>
            <div style="color:var(--os-text-muted);"><strong style="color:var(--c-role);">Security</strong> &nbsp;Roles</div>
          </div>
        </aside>

        <div class="graph-wrap">
          <div id="network"></div>
          <div class="graph-overlay" id="overlay">
            <div class="overlay-title" id="ov-title"></div>
            <div class="overlay-type" id="ov-type"></div>
            <div class="overlay-desc" id="ov-desc"></div>
          </div>
          <div class="legend-floating">
            <div><span class="legend-dot" style="background:var(--c-app)"></span>App</div>
            <div><span class="legend-dot" style="background:var(--c-uiflow)"></span>UI Flow</div>
            <div><span class="legend-dot" style="background:var(--c-screen)"></span>Screen</div>
            <div><span class="legend-dot" style="background:var(--c-action)"></span>Action</div>
            <div><span class="legend-dot" style="background:var(--c-function)"></span>Function</div>
            <div><span class="legend-dot" style="background:var(--c-entity)"></span>Entity</div>
            <div><span class="legend-dot" style="background:var(--c-enum)"></span>Enum</div>
            <div><span class="legend-dot" style="background:var(--c-structure)"></span>Structure</div>
            <div><span class="legend-dot" style="background:var(--c-role)"></span>Role</div>
            <div style="color:var(--os-text-dim);font-size:10px;margin-left:4px;">Scroll · Drag · Click</div>
          </div>
          <div class="graph-controls">
            <button class="ctrl-btn" id="zoom-fit" title="Fit">⤢</button>
            <button class="ctrl-btn" id="zoom-in" title="Zoom in">+</button>
            <button class="ctrl-btn" id="zoom-out" title="Zoom out">−</button>
          </div>
        </div>
      </main>
    </div>
  </template>

  <template id="tpl-empty">
    <div class="empty-state">
      <div class="mark">A</div>
      <h1>Template not yet populated</h1>
      <p>
        This is the bare <code>template.html</code> shipped with the
        <code>outsystems-app-architecture</code> skill. Run the skill
        through Claude Code (or invoke <code>scripts/build.py</code> directly)
        to populate it with your app data.
      </p>
      <p style="font-size: 12px;">Expected placeholder: <code>/*__APP_DATA__*/</code>.</p>
    </div>
  </template>

  <script>
    // ============================================================
    // Data — populated by build.py. Do not edit by hand.
    // ============================================================
    const APP_DATA = /*__APP_DATA__*/null;

    // ============================================================
    // Boot
    // ============================================================
    const root = document.getElementById('app-root');
    if (!APP_DATA || !APP_DATA.app) {
      root.appendChild(document.getElementById('tpl-empty').content.cloneNode(true));
    } else {
      root.appendChild(document.getElementById('tpl-app').content.cloneNode(true));
      boot();
    }

    function boot() {
      const D = APP_DATA;
      const app = D.app;

      // ----- Header + sidebar context -----
      document.title = `${app.name} — App Architecture`;
      document.getElementById('hdr-mark').textContent = (app.name || 'A').charAt(0).toUpperCase();
      document.getElementById('hdr-name').textContent = `${app.name} — Architecture`;
      document.getElementById('hdr-sub').textContent  = app.description || app.type;
      document.getElementById('hdr-key').textContent  = `${(app.key || '').slice(0,8)} · ${app.name}`;
      document.getElementById('hdr-rev').textContent  = `r${app.revision}`;
      document.getElementById('hdr-type').textContent = app.type;
      document.getElementById('ctx-key').textContent  = `${(app.key||'').slice(0,8)}…${(app.key||'').slice(-5)}`;
      document.getElementById('ctx-type').textContent = app.type;
      document.getElementById('ctx-rev').textContent  = `r${app.revision}`;
      document.getElementById('ctx-date').textContent = app.date || '—';
      document.getElementById('ctx-inherited').textContent = D.inheritedCount || 0;

      // ----- Stats -----
      const fnCount  = D.actions.filter(a => a.kind === 'function').length;
      const actCount = D.actions.filter(a => a.kind === 'action').length;
      document.getElementById('stat-flows').textContent      = D.uiFlows.length;
      document.getElementById('stat-screens').textContent    = D.screens.length;
      document.getElementById('stat-actions').textContent    = actCount;
      document.getElementById('stat-functions').textContent  = fnCount;
      document.getElementById('stat-entities').textContent   = D.entities.length;
      document.getElementById('stat-enums').textContent      = D.enums.length;
      document.getElementById('stat-structures').textContent = D.structures.length;
      document.getElementById('stat-roles').textContent      = D.roles.length;

      // ----- Categories + colors -----
      const depAI       = (D.deps || []).filter(d => d.cat === 'AIModel');
      const depLib      = (D.deps || []).filter(d => d.cat === 'Library');
      const inheritedEn = D.inheritedEntities || [];
      const CATS = {
        Screen:    { label: 'Screens',           color: '#FF8DA0', count: D.screens.length },
        Action:    { label: 'Actions',           color: '#60A5FA', count: actCount },
        Function:  { label: 'Functions',         color: '#A78BFA', count: fnCount },
        Entity:    { label: 'Entities (owned)',  color: '#34D399', count: D.entities.length },
        Inherited: { label: 'Entities (inh.)',   color: '#6EE7B7', count: inheritedEn.length },
        Enum:      { label: 'Static Enums',      color: '#14B8A6', count: D.enums.length },
        Structure: { label: 'Structures',        color: '#22D3EE', count: D.structures.length },
        Role:      { label: 'Roles',             color: '#FB923C', count: D.roles.length },
        AIModel:   { label: 'AI Models',         color: '#FF3D52', count: depAI.length },
        Library:   { label: 'Libraries',         color: '#F472B6', count: depLib.length },
      };

      const activeCats = new Set(Object.keys(CATS));

      // Sidebar filter UI
      const filterList = document.getElementById('filter-list');
      Object.keys(CATS).forEach(c => {
        const m = CATS[c];
        const row = document.createElement('label');
        row.className = 'filter-row';
        row.dataset.cat = c;
        row.innerHTML = `
          <span class="filter-swatch" style="background:${m.color}"></span>
          <span class="filter-name">${m.label}</span>
          <span class="filter-count">${m.count}</span>
        `;
        row.addEventListener('click', () => {
          if (activeCats.has(c)) { activeCats.delete(c); row.classList.add('is-off'); }
          else { activeCats.add(c); row.classList.remove('is-off'); }
          applyFilters();
        });
        filterList.appendChild(row);
      });
      document.getElementById('filter-reset').addEventListener('click', () => {
        activeCats.clear();
        Object.keys(CATS).forEach(c => activeCats.add(c));
        document.querySelectorAll('.filter-row').forEach(r => r.classList.remove('is-off'));
        document.getElementById('search').value = '';
        applyFilters();
      });

      // ----- Build graph -----
      const nodes = new vis.DataSet();
      const edges = new vis.DataSet();

      // App center
      nodes.add({
        id: 'app',
        label: app.name,
        title: `${app.name} (${app.type})`,
        color: { background: '#FFFFFF', border: '#FF3D52' },
        font: { color: '#0A0A0F', size: 18, face: 'Inter' },
        shape: 'dot', size: 38, borderWidth: 3,
        meta: { cat: 'App', type: app.type, name: app.name,
                desc: app.description || `${app.type} · rev ${app.revision}` }
      });

      // Layer hubs
      const LAYERS = [
        { id: 'layer-ui',    name: 'UI Layer',    color: '#FF8DA0' },
        { id: 'layer-logic', name: 'Logic Layer', color: '#60A5FA' },
        { id: 'layer-data',  name: 'Data Layer',  color: '#34D399' },
        { id: 'layer-sec',   name: 'Security',    color: '#FB923C' },
      ];
      // Dependencies layer is only added when refs data was provided.
      if ((D.deps || []).length > 0) {
        LAYERS.push({ id: 'layer-deps', name: 'Dependencies', color: '#FF3D52' });
      }
      LAYERS.forEach(L => {
        nodes.add({
          id: L.id, label: L.name, title: `${L.name} hub`,
          color: { background: '#1F1F2A', border: L.color },
          font: { color: L.color, size: 14, face: 'Inter', bold: true },
          shape: 'box', shapeProperties: { borderRadius: 8 },
          borderWidth: 2, margin: 10,
          meta: { cat: 'Layer', type: 'Layer', name: L.name }
        });
        edges.add({ from: 'app', to: L.id, color: { color: '#4A4A5A', opacity: 0.7 }, width: 2.5 });
      });

      // ----- UI: flows → screens -----
      D.uiFlows.forEach(f => {
        nodes.add({
          id: `flow-${f.key}`, label: f.name, title: `UI Flow: ${f.name}`,
          color: { background: '#15151E', border: '#FBBF24' },
          font: { color: '#FBBF24', size: 12, face: 'Inter', bold: true },
          shape: 'box', shapeProperties: { borderRadius: 6 },
          borderWidth: 2, margin: 8,
          meta: { cat: 'UIFlow', type: 'UI Flow', name: f.name }
        });
        edges.add({ from: 'layer-ui', to: `flow-${f.key}`,
                    color: { color: '#FBBF24', opacity: 0.4 }, width: 1.5 });
      });
      D.screens.forEach(s => {
        nodes.add({
          id: s.k,
          label: s.n.length > 22 ? s.n.substring(0,20)+'…' : s.n,
          title: `${s.n}\n${s.desc || ''}`,
          color: { background: '#FF8DA022', border: '#FF8DA0' },
          font: { color: '#E8E8F0', size: 10, face: 'Inter' },
          shape: 'dot', size: 10, borderWidth: 1.5,
          meta: { cat: 'Screen', type: 'Screen', name: s.n, desc: s.desc, pub: s.pub }
        });
        const flowId = `flow-${s.flow}`;
        edges.add({ from: flowId, to: s.k,
                    color: { color: '#FF8DA0', opacity: 0.25 }, width: 0.7 });
      });

      // ----- Logic: actions + functions grouped by kind -----
      const ACTION_GROUPS = [
        { id: 'ag-action',   name: 'Server Actions', kind: 'action',   color: '#60A5FA' },
        { id: 'ag-function', name: 'Functions',      kind: 'function', color: '#A78BFA' },
      ];
      ACTION_GROUPS.forEach(g => {
        const n = D.actions.filter(a => a.kind === g.kind).length;
        if (n === 0) return;
        nodes.add({
          id: g.id, label: `${g.name}\n${n}`,
          color: { background: '#15151E', border: g.color },
          font: { color: g.color, size: 11, face: 'Inter', bold: true },
          shape: 'box', shapeProperties: { borderRadius: 6 },
          borderWidth: 2, margin: 6,
          meta: { cat: 'ActionGroup', type: g.name, name: `${g.name} (${n})` }
        });
        edges.add({ from: 'layer-logic', to: g.id,
                    color: { color: g.color, opacity: 0.4 }, width: 1.5 });
      });
      D.actions.forEach(a => {
        const color = a.kind === 'function' ? '#A78BFA' : '#60A5FA';
        const groupId = a.kind === 'function' ? 'ag-function' : 'ag-action';
        nodes.add({
          id: a.k,
          label: a.n.length > 24 ? a.n.substring(0,22)+'…' : a.n,
          title: `${a.n}\n${a.desc || ''}`,
          color: { background: color + '22', border: color },
          font: { color: '#E8E8F0', size: 9.5, face: 'Inter' },
          shape: a.kind === 'function' ? 'diamond' : 'dot',
          size: a.kind === 'function' ? 8 : 9, borderWidth: 1.2,
          meta: { cat: a.kind === 'function' ? 'Function' : 'Action',
                  type: a.kind === 'function' ? 'Function' : 'Server Action',
                  name: a.n, desc: a.desc, pub: a.pub }
        });
        edges.add({ from: groupId, to: a.k,
                    color: { color, opacity: 0.18 }, width: 0.5 });
      });

      // ----- Data: entities, inherited entities, enums, structures -----
      const DATA_HUBS = [
        { id: 'dh-ent',  name: 'Entities\n(owned)',     color: '#34D399', items: D.entities,        cat: 'Entity',          shape: 'square'   },
        { id: 'dh-ient', name: 'Entities\n(inherited)', color: '#6EE7B7', items: inheritedEn,       cat: 'InheritedEntity', shape: 'square'   },
        { id: 'dh-enu',  name: 'Enums',                 color: '#14B8A6', items: D.enums,           cat: 'Enum',            shape: 'triangle' },
        { id: 'dh-str',  name: 'Structures',            color: '#22D3EE', items: D.structures,      cat: 'Structure',       shape: 'dot'      },
      ];
      DATA_HUBS.forEach(h => {
        if (h.items.length === 0) return;
        nodes.add({
          id: h.id, label: `${h.name}\n${h.items.length}`,
          color: { background: '#15151E', border: h.color },
          font: { color: h.color, size: 12, face: 'Inter', bold: true },
          shape: 'box', shapeProperties: { borderRadius: 6 },
          borderWidth: 2, margin: 8,
          meta: { cat: 'DataHub', type: h.name, name: `${h.name} (${h.items.length})` }
        });
        edges.add({ from: 'layer-data', to: h.id,
                    color: { color: h.color, opacity: 0.4 }, width: 1.5 });
        h.items.forEach(it => {
          // For inherited entities, surface the source module in the tooltip
          // and prefix the visible label so reviewers immediately see the
          // attribution (e.g. "[EmployeeDir_DB] Employee" — solves the
          // "no owned entities" misleading-message field-test report).
          const isInh = h.cat === 'InheritedEntity';
          const tipExtra = isInh && it.fromModule ? `\nfrom: ${it.fromModule}` : '';
          // Node ids must be unique — inherited entities can share keys with
          // owned ones in odd edge cases. Prefix to be safe.
          const nodeId = isInh ? `inh:${it.k}` : it.k;
          nodes.add({
            id: nodeId,
            label: it.n.length > 22 ? it.n.substring(0,20)+'…' : it.n,
            title: `${it.n}\n${it.desc || ''}${tipExtra}`,
            color: { background: h.color + '22', border: h.color },
            font: { color: '#E8E8F0', size: 10, face: 'Inter' },
            shape: h.shape,
            size: (h.cat === 'Entity' || h.cat === 'InheritedEntity') ? 12 : (h.cat === 'Enum' ? 7 : 9),
            borderWidth: 1.4,
            meta: { cat: h.cat, type: h.cat, name: it.n,
                    desc: it.desc, fromModule: it.fromModule || null }
          });
          edges.add({ from: h.id, to: nodeId,
                      color: { color: h.color, opacity: 0.2 }, width: 0.6 });
        });
      });

      // ----- Security: roles -----
      D.roles.forEach(r => {
        nodes.add({
          id: r.k, label: r.n, title: `Role: ${r.n}`,
          color: { background: '#FB923C22', border: '#FB923C' },
          font: { color: '#E8E8F0', size: 11, face: 'Inter' },
          shape: 'star', size: 14, borderWidth: 1.5,
          meta: { cat: 'Role', type: 'Role', name: r.n, desc: r.desc, pub: r.pub }
        });
        edges.add({ from: 'layer-sec', to: r.k,
                    color: { color: '#FB923C', opacity: 0.5 }, width: 1.5 });
      });

      // ----- Dependencies: AI model connections + libraries -----
      // Only rendered when --refs was provided to build.py (i.e. when
      // app_refs data is available, either fresh or via the
      // outsystems-dependency-impact cache).
      const DEP_GROUPS = [
        { id: 'dg-ai',  name: 'AI Models', cat: 'AIModel', color: '#FF3D52',
          items: depAI,  shape: 'hexagon' },
        { id: 'dg-lib', name: 'Libraries', cat: 'Library', color: '#F472B6',
          items: depLib, shape: 'dot' },
      ];
      DEP_GROUPS.forEach(g => {
        if (g.items.length === 0) return;
        nodes.add({
          id: g.id, label: `${g.name}\n${g.items.length}`,
          color: { background: '#15151E', border: g.color },
          font: { color: g.color, size: 12, face: 'Inter', bold: true },
          shape: 'box', shapeProperties: { borderRadius: 6 },
          borderWidth: 2, margin: 8,
          meta: { cat: 'DepHub', type: g.name, name: `${g.name} (${g.items.length})` }
        });
        edges.add({ from: 'layer-deps', to: g.id,
                    color: { color: g.color, opacity: 0.4 }, width: 1.5 });
        g.items.forEach(d => {
          // Prefix id so it can't collide with screen/action/entity keys
          const nodeId = `dep:${d.k || d.n}`;
          const title = `${d.n}\nkind: ${d.kind || '?'}${d.rev ? `\nrev: ${d.rev}` : ''}`;
          nodes.add({
            id: nodeId,
            label: d.n.length > 22 ? d.n.substring(0,20)+'…' : d.n,
            title,
            color: { background: g.color + '22', border: g.color },
            font: { color: '#E8E8F0', size: 10, face: 'Inter' },
            shape: g.shape, size: g.cat === 'AIModel' ? 13 : 10, borderWidth: 1.4,
            meta: { cat: g.cat, type: d.kind || g.name, name: d.n,
                    desc: d.rev ? `rev ${d.rev}` : '' }
          });
          edges.add({ from: g.id, to: nodeId,
                      color: { color: g.color, opacity: 0.3 }, width: 0.8 });
        });
      });

      // ----- Render -----
      const container = document.getElementById('network');
      const options = {
        autoResize: true,
        nodes: { shadow: { enabled: true, color: 'rgba(0,0,0,0.55)', size: 8, x: 0, y: 2 } },
        edges: { smooth: { enabled: true, type: 'continuous', roundness: 0.4 } },
        physics: {
          enabled: true,
          solver: 'forceAtlas2Based',
          forceAtlas2Based: {
            gravitationalConstant: -65,
            centralGravity: 0.015,
            springLength: 130,
            springConstant: 0.09,
            damping: 0.55,
            avoidOverlap: 0.7
          },
          stabilization: { iterations: 260, updateInterval: 50 },
          timestep: 0.4
        },
        interaction: { hover: true, tooltipDelay: 200, zoomView: true, dragNodes: true }
      };
      const network = new vis.Network(container, { nodes, edges }, options);
      network.once('stabilizationIterationsDone', () => {
        network.setOptions({ physics: { enabled: false } });
        network.fit({ animation: { duration: 800, easingFunction: 'easeInOutCubic' } });
      });

      // Overlay
      const overlay = document.getElementById('overlay');
      const ovTitle = document.getElementById('ov-title');
      const ovType  = document.getElementById('ov-type');
      const ovDesc  = document.getElementById('ov-desc');
      const CAT_COLOR = {
        App: '#FF3D52', Layer: '#9B9BA8', UIFlow: '#FBBF24',
        Screen: '#FF8DA0', Action: '#60A5FA', Function: '#A78BFA',
        ActionGroup: '#60A5FA', DataHub: '#34D399',
        Entity: '#34D399', Enum: '#14B8A6', Structure: '#22D3EE',
        Role: '#FB923C'
      };
      network.on('click', params => {
        if (!params.nodes.length) { overlay.classList.remove('is-visible'); return; }
        const n = nodes.get(params.nodes[0]);
        const m = n.meta || {};
        const c = CAT_COLOR[m.cat] || '#9B9BA8';
        ovTitle.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block;"></span>${m.name || n.label}`;
        ovType.textContent = m.type || '—';
        ovDesc.textContent = m.desc || '';
        overlay.classList.add('is-visible');
      });

      // ----- Filtering -----
      const searchInput = document.getElementById('search');
      searchInput.addEventListener('input', applyFilters);

      function isVisibleCat(cat) {
        if (['App', 'Layer', 'UIFlow'].includes(cat)) return true;
        if (cat === 'ActionGroup') return activeCats.has('Action') || activeCats.has('Function');
        if (cat === 'DataHub') return activeCats.has('Entity') || activeCats.has('Enum') || activeCats.has('Structure');
        return activeCats.has(cat);
      }
      function applyFilters() {
        const q = (searchInput.value || '').trim().toLowerCase();
        const updates = [];
        nodes.forEach(n => {
          const m = n.meta || {};
          const cat = m.cat;
          const isScaffold = ['App', 'Layer', 'UIFlow', 'ActionGroup', 'DataHub'].includes(cat);
          const matchesCat = isVisibleCat(cat);
          const matchesSearch = !q || isScaffold || (m.name || '').toLowerCase().includes(q);
          updates.push({ id: n.id, hidden: !(matchesCat && matchesSearch) });
        });
        nodes.update(updates);
      }

      // Zoom
      document.getElementById('zoom-fit').addEventListener('click', () =>
        network.fit({ animation: { duration: 600, easingFunction: 'easeInOutCubic' } }));
      document.getElementById('zoom-in').addEventListener('click', () => {
        const s = network.getScale(); network.moveTo({ scale: s * 1.25, animation: { duration: 200 } });
      });
      document.getElementById('zoom-out').addEventListener('click', () => {
        const s = network.getScale(); network.moveTo({ scale: s * 0.8, animation: { duration: 200 } });
      });
    }
  </script>
</body>
</html>
