<!DOCTYPE html>
<!--
  template-version: 1.0.0
  Generated by the `outsystems-tenant-architecture` skill.
  Populate via `inject.py <cache-dir> <output-path>`.
  Placeholders: /*__TENANT__*/, /*__ENVS__*/, /*__ASSETS__*/
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OutSystems Tenant Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --os-bg: #0A0A0F;
      --os-bg-2: #11111A;
      --os-card: #161620;
      --os-card-2: #1C1C28;
      --os-border: #262633;
      --os-border-strong: #353548;
      --os-text: #F5F5F7;
      --os-text-muted: #9B9BA8;
      --os-text-dim: #6B6B7A;
      --os-red: #FF3D52;
      --os-red-dark: #C42030;
      --os-red-glow: rgba(255, 61, 82, 0.18);

      --c-web: #FF3D52;
      --c-mobile: #FF8DA0;
      --c-agent: #B57BFF;
      --c-aimodel: #E94EAB;
      --c-workflow: #34D399;
      --c-lowcode: #3B82F6;
      --c-extension: #22D3EE;
      --c-mobilelib: #14B8A6;
      --c-externallib: #A3E635;
      --c-widget: #FBBF24;
      --c-extconn: #FB923C;
      --c-tenant: #FFFFFF;
      --c-env-dev: #60A5FA;
      --c-env-test: #FBBF24;
      --c-env-prod: #34D399;
      --c-unknown: #6B6B7A;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--os-bg);
      color: var(--os-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      letter-spacing: -0.01em;
      overflow: hidden;
    }
    .app { display: grid; grid-template-rows: auto auto 1fr; height: 100vh; }

    /* Empty state — shown when placeholders aren't populated */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; gap: 16px; padding: 40px;
      text-align: center;
    }
    .empty-state .mark {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: white; font-size: 28px;
      box-shadow: 0 10px 40px var(--os-red-glow);
    }
    .empty-state h1 { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
    .empty-state p { color: var(--os-text-muted); max-width: 500px; line-height: 1.55; font-size: 14px; }
    .empty-state code {
      background: var(--os-card); padding: 2px 8px; border-radius: 5px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      border: 1px solid var(--os-border); color: var(--os-text);
    }

    /* Header */
    header.topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px;
      background: linear-gradient(180deg, #0E0E16 0%, #0A0A0F 100%);
      border-bottom: 1px solid var(--os-border);
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-mark {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--os-red) 0%, var(--os-red-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px var(--os-red-glow);
      font-weight: 800; color: white; font-size: 18px;
    }
    .brand-name { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .brand-sub { font-size: 12px; color: var(--os-text-muted); margin-top: 2px; }
    .header-meta { display: flex; gap: 22px; align-items: center; }
    .meta-item { display: flex; flex-direction: column; }
    .meta-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--os-text-dim); font-weight: 600;
    }
    .meta-value { font-size: 13px; color: var(--os-text); font-weight: 500; margin-top: 3px; }
    .meta-value.pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--os-card-2); border: 1px solid var(--os-border);
      padding: 3px 10px; border-radius: 999px;
      font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px;
    }
    .pulse {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--c-workflow);
      box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
      70% { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      padding: 16px 28px;
      background: var(--os-bg);
      border-bottom: 1px solid var(--os-border);
    }
    .stat {
      background: linear-gradient(180deg, var(--os-card) 0%, var(--os-card-2) 100%);
      border: 1px solid var(--os-border);
      border-radius: 12px;
      padding: 14px 16px;
      position: relative; overflow: hidden;
    }
    .stat::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent, var(--os-red));
    }
    .stat-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--os-text-muted); font-weight: 600;
    }
    .stat-value {
      font-size: 26px; font-weight: 700; color: var(--os-text);
      margin-top: 4px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
    }
    .stat-detail { font-size: 11px; color: var(--os-text-dim); margin-top: 2px; }

    /* Main */
    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100%;
      overflow: hidden;
    }
    aside.sidebar {
      background: var(--os-bg-2);
      border-right: 1px solid var(--os-border);
      padding: 18px 18px;
      overflow-y: auto;
    }
    .panel-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--os-text-muted); font-weight: 600;
      margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title button {
      background: none; border: none; color: var(--os-red);
      font-size: 10px; letter-spacing: 0.08em; cursor: pointer; font-weight: 600;
    }
    .panel-title button:hover { color: #ff7184; }

    .search {
      width: 100%;
      background: var(--os-card); border: 1px solid var(--os-border);
      border-radius: 8px; color: var(--os-text);
      padding: 8px 12px; font-size: 13px; font-family: inherit;
      margin-bottom: 18px; outline: none;
    }
    .search:focus { border-color: var(--os-red); box-shadow: 0 0 0 3px var(--os-red-glow); }

    .filter-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 22px; }
    .filter-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 8px; border-radius: 7px;
      cursor: pointer; user-select: none;
      transition: background 120ms;
    }
    .filter-row:hover { background: var(--os-card); }
    .filter-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .filter-row .filter-name { flex: 1; font-size: 13px; color: var(--os-text); }
    .filter-row.is-off .filter-name { color: var(--os-text-dim); text-decoration: line-through; opacity: 0.6; }
    .filter-row.is-off .filter-swatch { opacity: 0.35; }
    .filter-count {
      font-size: 11px; color: var(--os-text-muted);
      font-variant-numeric: tabular-nums;
      background: var(--os-card); padding: 2px 7px; border-radius: 999px;
      border: 1px solid var(--os-border);
    }
    .filter-row.is-off .filter-count { opacity: 0.4; }

    .ctx-block {
      background: var(--os-card); border: 1px solid var(--os-border);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 12px;
    }
    .ctx-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; gap: 12px; }
    .ctx-row + .ctx-row { border-top: 1px solid var(--os-border); }
    .ctx-key { color: var(--os-text-muted); }
    .ctx-val { color: var(--os-text); font-weight: 500; }

    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--os-text-muted);
      margin-bottom: 5px;
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--c-tenant);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
    }
    .legend-dot.env { background: var(--c-env-dev); box-shadow: none; }
    .legend-dot.hub { background: var(--os-text-muted); box-shadow: none; }

    /* Graph */
    .graph-wrap {
      position: relative;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 61, 82, 0.04) 0%, transparent 60%),
        var(--os-bg);
      overflow: hidden;
    }
    #network { width: 100%; height: 100%; }
    .graph-overlay {
      position: absolute; top: 16px; right: 16px;
      background: rgba(15, 15, 22, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid var(--os-border);
      border-radius: 10px;
      padding: 12px 14px;
      max-width: 280px;
      pointer-events: none;
      opacity: 0; transition: opacity 150ms;
    }
    .graph-overlay.is-visible { opacity: 1; }
    .overlay-title {
      font-size: 13px; font-weight: 600; color: var(--os-text);
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .overlay-type {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--os-text-dim); margin-bottom: 8px;
    }
    .overlay-row { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; gap: 12px; }
    .overlay-row .k { color: var(--os-text-muted); }
    .overlay-row .v { color: var(--os-text); font-family: 'JetBrains Mono', monospace; }

    .legend-floating {
      position: absolute; bottom: 16px; left: 16px;
      background: rgba(15, 15, 22, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid var(--os-border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11px; color: var(--os-text-muted);
      display: flex; gap: 16px; align-items: center;
    }
    .legend-floating > div { display: flex; align-items: center; gap: 6px; }

    .graph-controls {
      position: absolute; bottom: 16px; right: 16px;
      display: flex; gap: 8px;
    }
    .ctrl-btn {
      background: rgba(15, 15, 22, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--os-border);
      color: var(--os-text);
      width: 36px; height: 36px; border-radius: 8px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 120ms;
    }
    .ctrl-btn:hover { border-color: var(--os-red); color: var(--os-red); }

    aside.sidebar::-webkit-scrollbar { width: 6px; }
    aside.sidebar::-webkit-scrollbar-track { background: transparent; }
    aside.sidebar::-webkit-scrollbar-thumb { background: var(--os-border-strong); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app-root">
    <!-- Populated by JS at boot -->
  </div>

  <template id="tpl-app">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">O</div>
          <div>
            <div class="brand-name">Tenant Architecture</div>
            <div class="brand-sub">OutSystems Developer Cloud · Enterprise Context</div>
          </div>
        </div>
        <div class="header-meta">
          <div class="meta-item">
            <span class="meta-label">Tenant</span>
            <span class="meta-value pill" id="hdr-tenant">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Region</span>
            <span class="meta-value" id="hdr-region">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Environments</span>
            <span class="meta-value" id="hdr-envs">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Status</span>
            <span class="meta-value" style="display:flex;align-items:center;gap:8px;"><span class="pulse"></span>Live</span>
          </div>
        </div>
      </header>

      <section class="stats">
        <div class="stat" style="--accent: var(--c-tenant)">
          <div class="stat-label">Total Assets</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-detail">Across all environments</div>
        </div>
        <div class="stat" style="--accent: var(--c-web)">
          <div class="stat-label">Applications</div>
          <div class="stat-value" id="stat-apps">—</div>
          <div class="stat-detail">Web + Mobile</div>
        </div>
        <div class="stat" style="--accent: var(--c-agent)">
          <div class="stat-label">AI Agents</div>
          <div class="stat-value" id="stat-agents">—</div>
          <div class="stat-detail">Agentic workflows</div>
        </div>
        <div class="stat" style="--accent: var(--c-lowcode)">
          <div class="stat-label">Libraries</div>
          <div class="stat-value" id="stat-libs">—</div>
          <div class="stat-detail">Low-code · Extension · Mobile</div>
        </div>
        <div class="stat" style="--accent: var(--c-aimodel)">
          <div class="stat-label">AI Models</div>
          <div class="stat-value" id="stat-aim">—</div>
          <div class="stat-detail">Model connections</div>
        </div>
        <div class="stat" style="--accent: var(--c-extconn)">
          <div class="stat-label">Integrations</div>
          <div class="stat-value" id="stat-conn">—</div>
          <div class="stat-detail">External systems</div>
        </div>
      </section>

      <main>
        <aside class="sidebar">
          <div class="panel-title"><span>Enterprise Context</span></div>
          <div class="ctx-block" id="ctx-block">
            <div class="ctx-row"><span class="ctx-key">Tenant ID</span><span class="ctx-val" id="ctx-id" style="font-family:'JetBrains Mono',monospace;font-size:10px;">—</span></div>
            <div class="ctx-row"><span class="ctx-key">Hosting</span><span class="ctx-val" id="ctx-hosting">—</span></div>
            <div class="ctx-row"><span class="ctx-key">Region</span><span class="ctx-val" id="ctx-region">—</span></div>
            <div class="ctx-row"><span class="ctx-key">Realm</span><span class="ctx-val" id="ctx-realm">—</span></div>
            <div class="ctx-row"><span class="ctx-key">Environments</span><span class="ctx-val" id="ctx-envs">—</span></div>
          </div>

          <div class="panel-title">
            <span>Filter by Asset Type</span>
            <button id="filter-reset">RESET</button>
          </div>
          <input class="search" id="search" type="text" placeholder="Search assets…" />
          <div class="filter-list" id="filter-list"></div>

          <div class="panel-title"><span>Graph Legend</span></div>
          <div>
            <div class="legend-item"><span class="legend-dot" style="background:#fff"></span>Tenant root</div>
            <div class="legend-item"><span class="legend-dot env"></span>Environment</div>
            <div class="legend-item"><span class="legend-dot hub"></span>Category hub</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--c-web)"></span>Asset (colored by type)</div>
          </div>
        </aside>

        <div class="graph-wrap">
          <div id="network"></div>
          <div class="graph-overlay" id="overlay">
            <div class="overlay-title" id="ov-title"></div>
            <div class="overlay-type" id="ov-type"></div>
            <div class="overlay-row"><span class="k">Revision</span><span class="v" id="ov-rev"></span></div>
            <div class="overlay-row"><span class="k">Updated</span><span class="v" id="ov-date"></span></div>
            <div class="overlay-row"><span class="k">External</span><span class="v" id="ov-ext"></span></div>
            <div class="overlay-row"><span class="k">Key</span><span class="v" id="ov-key" style="font-size:9px;"></span></div>
          </div>
          <div class="legend-floating">
            <div><span class="legend-dot" style="background:#fff"></span>Tenant</div>
            <div><span class="legend-dot env"></span>Env</div>
            <div><span class="legend-dot hub"></span>Hub</div>
            <div style="color:var(--os-text-dim);font-size:10px;">Scroll · Drag · Click for details</div>
          </div>
          <div class="graph-controls">
            <button class="ctrl-btn" id="zoom-fit" title="Fit graph">⤢</button>
            <button class="ctrl-btn" id="zoom-in" title="Zoom in">+</button>
            <button class="ctrl-btn" id="zoom-out" title="Zoom out">−</button>
          </div>
        </div>
      </main>
    </div>
  </template>

  <template id="tpl-empty">
    <div class="empty-state">
      <div class="mark">O</div>
      <h1>Template not yet populated</h1>
      <p>
        This is the bare <code>template.html</code> shipped with the
        <code>outsystems-tenant-architecture</code> skill. Run the skill
        through Claude Code (or invoke <code>inject.py</code> directly)
        to populate it with your tenant data.
      </p>
      <p style="font-size: 12px;">
        Expected placeholders: <code>/*__TENANT__*/</code>,
        <code>/*__ENVS__*/</code>, <code>/*__ASSETS__*/</code>.
      </p>
    </div>
  </template>

  <script>
    // ============================================================
    // Data — populated by inject.py from cached MCP responses.
    // Do not edit by hand.
    // ============================================================
    const TENANT       = /*__TENANT__*/null;
    const ENVIRONMENTS = /*__ENVS__*/null;
    const ASSETS       = /*__ASSETS__*/null;

    // ============================================================
    // Boot
    // ============================================================
    const root = document.getElementById('app-root');

    if (!TENANT || !Array.isArray(ENVIRONMENTS) || !Array.isArray(ASSETS)) {
      root.appendChild(document.getElementById('tpl-empty').content.cloneNode(true));
    } else {
      root.appendChild(document.getElementById('tpl-app').content.cloneNode(true));
      boot();
    }

    function boot() {
      // ----- Asset type catalog -----
      const TYPES = {
        WebApplication:     { label: "Web Application",     color: "#FF3D52", hub: "Applications" },
        MobileApplication:  { label: "Mobile Application",  color: "#FF8DA0", hub: "Applications" },
        Agent:              { label: "AI Agent",            color: "#B57BFF", hub: "AI" },
        AIModelConnection:  { label: "AI Model Connection", color: "#E94EAB", hub: "AI" },
        Workflow:           { label: "Workflow",            color: "#34D399", hub: "Applications" },
        LowCodeLibrary:     { label: "Low-Code Library",    color: "#3B82F6", hub: "Libraries" },
        ExtensionLibrary:   { label: "Extension Library",   color: "#22D3EE", hub: "Libraries" },
        MobileLibrary:      { label: "Mobile Library",      color: "#14B8A6", hub: "Libraries" },
        ExternalLibrary:    { label: "External Library",    color: "#A3E635", hub: "Libraries" },
        WidgetLibrary:      { label: "Widget Library",      color: "#FBBF24", hub: "Libraries" },
        ExternalConnection: { label: "External Connection", color: "#FB923C", hub: "Integrations" }
      };
      const HUBS = ["Applications", "AI", "Libraries", "Integrations"];

      // Unknown types fall back to a neutral gray, classified under Integrations
      function typeMeta(t) {
        return TYPES[t] || { label: t || "Unknown", color: "#6B6B7A", hub: "Integrations" };
      }

      // ----- Header + sidebar context -----
      const tenantPrefix = (TENANT.id || "").slice(0, 8);
      document.getElementById('hdr-tenant').textContent = `${tenantPrefix} · ${TENANT.realm || "tenant"}`;
      document.getElementById('hdr-region').textContent = `${TENANT.region || "—"} · ${TENANT.hosting === "oscloud" ? "OS Cloud" : (TENANT.hosting || "—")}`;
      document.getElementById('hdr-envs').textContent   = `${ENVIRONMENTS.length} environment${ENVIRONMENTS.length === 1 ? "" : "s"}`;

      document.getElementById('ctx-id').textContent      = `${tenantPrefix}…${(TENANT.id || "").slice(-5)}`;
      document.getElementById('ctx-hosting').textContent = TENANT.hosting === "oscloud" ? "OS Cloud" : (TENANT.hosting || "—");
      document.getElementById('ctx-region').textContent  = TENANT.region || "—";
      document.getElementById('ctx-realm').textContent   = TENANT.realm || "—";
      document.getElementById('ctx-envs').textContent    = `${ENVIRONMENTS.length} (${ENVIRONMENTS.map(e => e.name).join(" · ")})`;
      document.title = `${TENANT.realm || "Tenant"} — OutSystems Architecture`;

      // ----- Counts -----
      const counts = {};
      ASSETS.forEach(a => { counts[a.t] = (counts[a.t] || 0) + 1; });
      const sumOf = (...ts) => ts.reduce((s, t) => s + (counts[t] || 0), 0);

      document.getElementById('stat-total').textContent  = ASSETS.length.toLocaleString();
      document.getElementById('stat-apps').textContent   = sumOf("WebApplication", "MobileApplication");
      document.getElementById('stat-agents').textContent = sumOf("Agent");
      document.getElementById('stat-libs').textContent   = sumOf("LowCodeLibrary", "ExtensionLibrary", "MobileLibrary", "ExternalLibrary", "WidgetLibrary");
      document.getElementById('stat-aim').textContent    = sumOf("AIModelConnection");
      document.getElementById('stat-conn').textContent   = sumOf("ExternalConnection");

      // ----- Filter UI -----
      const filterList = document.getElementById('filter-list');
      const activeTypes = new Set();

      // Show all known types that appear + any unknown types found in data
      const presentTypes = Array.from(new Set(ASSETS.map(a => a.t)));
      presentTypes.forEach(t => activeTypes.add(t));

      presentTypes
        .sort((a, b) => (counts[b] || 0) - (counts[a] || 0))
        .forEach(t => {
          const m = typeMeta(t);
          const row = document.createElement('label');
          row.className = 'filter-row';
          row.dataset.type = t;
          row.innerHTML = `
            <span class="filter-swatch" style="background:${m.color}"></span>
            <span class="filter-name">${m.label}</span>
            <span class="filter-count">${counts[t] || 0}</span>
          `;
          row.addEventListener('click', () => {
            if (activeTypes.has(t)) { activeTypes.delete(t); row.classList.add('is-off'); }
            else { activeTypes.add(t); row.classList.remove('is-off'); }
            applyFilters();
          });
          filterList.appendChild(row);
        });

      document.getElementById('filter-reset').addEventListener('click', () => {
        activeTypes.clear();
        presentTypes.forEach(t => activeTypes.add(t));
        document.querySelectorAll('.filter-row').forEach(r => r.classList.remove('is-off'));
        document.getElementById('search').value = '';
        applyFilters();
      });

      // ----- Graph data -----
      const nodes = new vis.DataSet();
      const edges = new vis.DataSet();

      // Tenant root
      nodes.add({
        id: 'tenant',
        label: TENANT.realm || 'tenant',
        title: 'Tenant root',
        color: { background: '#FFFFFF', border: '#FF3D52', highlight: { background: '#fff', border: '#FF3D52' } },
        font: { color: '#0A0A0F', size: 20, face: 'Inter' },
        shape: 'dot', size: 38, borderWidth: 3,
        meta: { type: 'Tenant' }
      });

      // Environments
      const envColors = { Development: '#60A5FA', NonProduction: '#FBBF24', Production: '#34D399' };
      ENVIRONMENTS.forEach(e => {
        const c = envColors[e.purpose] || '#60A5FA';
        nodes.add({
          id: `env-${e.key}`,
          label: e.name,
          title: `${e.name}\n${e.host || ''}`,
          color: { background: '#0A0A0F', border: c },
          font: { color: c, size: 14, face: 'Inter' },
          shape: 'hexagon', size: 22, borderWidth: 2,
          meta: { type: 'Environment', host: e.host, purpose: e.purpose }
        });
        edges.add({
          from: 'tenant', to: `env-${e.key}`,
          color: { color: '#3A3A4A', opacity: 0.8 }, width: 2
        });
      });

      // Category hubs
      HUBS.forEach(h => {
        nodes.add({
          id: `hub-${h}`, label: h, title: `${h} category hub`,
          color: { background: '#1F1F2A', border: '#5B5B6E' },
          font: { color: '#D8D8E0', size: 15, face: 'Inter', bold: true },
          shape: 'box', shapeProperties: { borderRadius: 8 },
          borderWidth: 2, margin: 10,
          meta: { type: 'Hub' }
        });
        edges.add({
          from: 'tenant', to: `hub-${h}`,
          color: { color: '#4A4A5A', opacity: 0.6 }, width: 2.5
        });
      });

      // Type sub-hubs
      presentTypes.forEach(t => {
        const m = typeMeta(t);
        const c = counts[t] || 0;
        if (c === 0) return;
        nodes.add({
          id: `type-${t}`,
          label: `${m.label}\n${c}`,
          title: `${m.label} (${c})`,
          color: { background: '#15151E', border: m.color },
          font: { color: m.color, size: 12, face: 'Inter', bold: true },
          shape: 'box', shapeProperties: { borderRadius: 6 },
          borderWidth: 2, margin: 8,
          meta: { type: 'AssetTypeHub' }
        });
        edges.add({
          from: `hub-${m.hub}`, to: `type-${t}`,
          color: { color: m.color, opacity: 0.4 }, width: 1.5
        });
      });

      // Asset nodes
      ASSETS.forEach(a => {
        const m = typeMeta(a.t);
        const isExt = !!a.x;
        nodes.add({
          id: a.k,
          label: a.n && a.n.length > 28 ? a.n.substring(0, 26) + '…' : (a.n || '—'),
          title: `${a.n}\n${m.label} · rev ${a.r}`,
          color: {
            background: isExt ? '#0F0F18' : m.color + '22',
            border: m.color,
            highlight: { background: m.color + '55', border: '#fff' }
          },
          font: { color: '#E8E8F0', size: 10, face: 'Inter' },
          shape: 'dot',
          size: Math.max(6, Math.min(14, 6 + Math.log((a.r || 1) + 1) * 2)),
          borderWidth: isExt ? 1 : 1.5,
          meta: {
            type: a.t, label: m.label, name: a.n,
            rev: a.r, date: a.d, ext: isExt, key: a.k
          }
        });
        edges.add({
          from: `type-${a.t}`, to: a.k,
          color: { color: m.color, opacity: 0.15 }, width: 0.6
        });
      });

      // ----- Render -----
      const container = document.getElementById('network');
      const options = {
        autoResize: true,
        nodes: { shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 8, x: 0, y: 2 } },
        edges: { smooth: { enabled: true, type: 'continuous', roundness: 0.4 } },
        physics: {
          enabled: true,
          solver: 'forceAtlas2Based',
          forceAtlas2Based: {
            gravitationalConstant: -55,
            centralGravity: 0.012,
            springLength: 130,
            springConstant: 0.08,
            damping: 0.55,
            avoidOverlap: 0.6
          },
          stabilization: { iterations: 220, updateInterval: 50 },
          timestep: 0.45
        },
        interaction: { hover: true, tooltipDelay: 200, zoomView: true, dragNodes: true },
        layout: { improvedLayout: true }
      };

      const network = new vis.Network(container, { nodes, edges }, options);

      network.once('stabilizationIterationsDone', () => {
        network.setOptions({ physics: { enabled: false } });
        network.fit({ animation: { duration: 800, easingFunction: 'easeInOutCubic' } });
      });

      // ----- Detail overlay -----
      const overlay = document.getElementById('overlay');
      const ovTitle = document.getElementById('ov-title');
      const ovType  = document.getElementById('ov-type');
      const ovRev   = document.getElementById('ov-rev');
      const ovDate  = document.getElementById('ov-date');
      const ovExt   = document.getElementById('ov-ext');
      const ovKey   = document.getElementById('ov-key');

      network.on('click', params => {
        if (!params.nodes.length) { overlay.classList.remove('is-visible'); return; }
        const node = nodes.get(params.nodes[0]);
        const m = node.meta || {};
        let dot = '#9B9BA8';
        if (TYPES[m.type]) dot = TYPES[m.type].color;
        else if (m.type === 'Tenant') dot = '#FFFFFF';
        else if (m.type === 'Environment') dot = '#60A5FA';
        else if (m.type === 'Hub' || m.type === 'AssetTypeHub') dot = '#9B9BA8';

        ovTitle.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${dot};display:inline-block;"></span>${m.name || node.label || node.id}`;
        ovType.textContent = m.label || m.type || '—';
        ovRev.textContent  = m.rev != null ? `r${m.rev}` : '—';
        ovDate.textContent = m.date || m.purpose || '—';
        ovExt.textContent  = m.ext === true ? 'Yes (Forge)' : (m.ext === false ? 'No (Tenant-owned)' : '—');
        ovKey.textContent  = m.key ? m.key.substring(0, 8) + '…' : (node.id.length > 12 ? node.id.substring(0, 12) + '…' : node.id);
        overlay.classList.add('is-visible');
      });

      // ----- Filter logic -----
      const searchInput = document.getElementById('search');
      searchInput.addEventListener('input', applyFilters);

      function applyFilters() {
        const q = (searchInput.value || '').trim().toLowerCase();
        const updates = [];
        ASSETS.forEach(a => {
          const matchesType = activeTypes.has(a.t);
          const matchesSearch = !q || (a.n || '').toLowerCase().includes(q);
          updates.push({ id: a.k, hidden: !(matchesType && matchesSearch) });
        });
        presentTypes.forEach(t => {
          updates.push({ id: `type-${t}`, hidden: !activeTypes.has(t) });
        });
        HUBS.forEach(h => {
          const children = presentTypes.filter(t => typeMeta(t).hub === h);
          const anyOn = children.some(t => activeTypes.has(t));
          updates.push({ id: `hub-${h}`, hidden: !anyOn });
        });
        nodes.update(updates);
      }

      // ----- Zoom controls -----
      document.getElementById('zoom-fit').addEventListener('click', () =>
        network.fit({ animation: { duration: 600, easingFunction: 'easeInOutCubic' } })
      );
      document.getElementById('zoom-in').addEventListener('click', () => {
        const s = network.getScale();
        network.moveTo({ scale: s * 1.25, animation: { duration: 200 } });
      });
      document.getElementById('zoom-out').addEventListener('click', () => {
        const s = network.getScale();
        network.moveTo({ scale: s * 0.8, animation: { duration: 200 } });
      });
    }
  </script>
</body>
</html>
